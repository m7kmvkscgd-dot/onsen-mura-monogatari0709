<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>敵イラストプロンプト生成</title>
<style>
  :root {
    --bg: #14181b; --surface: #1c2226; --surface-2: #20272b;
    --card-bg: #2f3540; --card-border: #5d4d35;
    --gold: #d7b66f; --ink: #ece6d8; --ink-soft: #a8a196;
    --accent: #c95d54; --ok: #6fa876;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    padding-bottom: 3rem;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--surface); border-bottom: 1px solid var(--card-border);
    padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
  }
  header h1 { font-size: 1.05rem; margin: 0; color: var(--gold); }
  header .progress { font-size: 0.85rem; color: var(--ink-soft); white-space: nowrap; }
  main { padding: 0.9rem; max-width: 640px; margin: 0 auto; }
  .panel {
    background: var(--surface-2); border: 1px solid var(--card-border); border-radius: 10px;
    padding: 0.9rem; margin-bottom: 1rem;
  }
  .panel h2 { font-size: 0.9rem; margin: 0 0 0.6rem; color: var(--gold); }
  textarea {
    width: 100%; background: #14181b; color: var(--ink); border: 1px solid #3a4147;
    border-radius: 8px; padding: 0.6rem; font-size: 0.82rem; line-height: 1.5;
    resize: vertical; font-family: inherit;
  }
  .style-tpl { height: 6.5rem; }
  .prompt-out { height: 9rem; }
  .row { display: flex; gap: 0.5rem; margin-top: 0.6rem; flex-wrap: wrap; }
  button {
    background: var(--card-bg); color: var(--ink); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 0.55rem 0.9rem; font-size: 0.85rem; cursor: pointer;
  }
  button.primary { background: linear-gradient(155deg, #7b5d36, #5c4426); color: #fff5e0; border-color: #937148; font-weight: bold; }
  button.small { padding: 0.35rem 0.6rem; font-size: 0.78rem; }
  button:active { transform: scale(0.97); }
  .selected-chip {
    display: inline-flex; align-items: center; gap: 0.3rem; background: var(--card-bg);
    border: 1px solid var(--gold); border-radius: 20px; padding: 0.25rem 0.6rem 0.25rem 0.7rem;
    font-size: 0.78rem; margin: 0.15rem;
  }
  .selected-chip button { padding: 0 0.3rem; background: none; border: none; color: var(--ink-soft); font-size: 0.9rem; }
  .area-block { margin-bottom: 0.7rem; }
  .area-title {
    font-size: 0.88rem; color: var(--gold); padding: 0.4rem 0.2rem; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--card-border);
  }
  .area-title .count { font-size: 0.75rem; color: var(--ink-soft); font-weight: normal; }
  .enemy-list { display: none; }
  .enemy-list.open { display: block; }
  .enemy-row {
    display: flex; align-items: flex-start; gap: 0.55rem; padding: 0.5rem 0.2rem;
    border-bottom: 1px solid #262c30; cursor: pointer;
  }
  .enemy-row.done { opacity: 0.4; }
  .enemy-row.picked { background: rgba(215,182,111,0.1); }
  .enemy-row input[type=checkbox] { margin-top: 0.2rem; flex-shrink: 0; }
  .enemy-row .name { font-weight: bold; font-size: 0.88rem; }
  .enemy-row .desc { font-size: 0.78rem; color: var(--ink-soft); margin-top: 0.1rem; }
  .toast {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    background: var(--ok); color: #0e1a10; padding: 0.5rem 1rem; border-radius: 20px;
    font-size: 0.82rem; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    z-index: 50; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>敵イラストプロンプト生成</h1>
  <div class="progress" id="progressLabel">0/0 完了</div>
</header>
<main>
  <div class="panel">
    <h2>共通スタイル文(編集可・自動保存)</h2>
    <textarea class="style-tpl" id="styleTpl"></textarea>
    <div class="row"><button class="small" id="resetTplBtn">デフォルトに戻す</button></div>
  </div>

  <div class="panel">
    <h2>選択中のキャラ <span id="selCount" style="color:var(--ink-soft); font-weight:normal;"></span></h2>
    <div id="selectedChips"></div>
    <div class="row">
      <button class="primary" id="nextTwoBtn">未完了から次の2体を自動選択</button>
      <button class="small" id="clearSelBtn">選択解除</button>
    </div>
  </div>

  <div class="panel">
    <h2>生成用プロンプト(コピーしてChatGPTへ)</h2>
    <textarea class="prompt-out" id="promptOut" readonly></textarea>
    <div class="row">
      <button class="primary" id="copyBtn">コピーする</button>
      <button id="markDoneBtn">選択中の敵を完了にする</button>
    </div>
    <div class="row" style="align-items:center; margin-top:0.6rem;">
      <span id="filenameHint" style="font-size:0.8rem; color:var(--ink-soft);"></span>
      <button class="small" id="copyFilenameBtn" style="display:none;">ファイル名をコピー</button>
    </div>
  </div>

  <div class="panel">
    <h2>全一覧(タップで選択/チェックで完了)</h2>
    <div id="areaList"></div>
  </div>
</main>
<div class="toast" id="toast"></div>

配置は必ず次の通りにしてください: 縦長のキャンバスを上下2段に分け、1体目を上半分、2体目を下半分に、それぞれ完全に収まるように描いてください。左右に並べる配置は禁止です。2体の間(上半分と下半分の境目)には、何も描かれていない透明な帯を、キャンバス全体の高さの1割程度、十分な幅で空けてください。刀・槍・髪・衣の裾・煙・炎など、どんな部位や持ち物であっても、自分の段の外や隣のキャラクターの領域にはみ出さないようにしてください。

重要: 各キャラクターは、頭の先から足先まで(全身を描く場合)、または描く範囲の端まで、自分の段の中に完全に収まるようにしてください。キャンバスの上端・下端・左右の端でキャラクターの体(頭・足・手・持ち物を含む)が切れてしまうことのないよう、余白を十分に残して少し小さめに描いてください。

キャラクター本体の縁(輪郭)は、ぼかさずくっきりと描いてください。水しぶき・後光・もや・炎のゆらめきなどの演出も、輪郭をくっきりさせ、透明部分との境目が曖昧にならないようにしてください。

塗りは絵画的なデジタルイラスト(セミリアルなダークファンタジー系アニメ塗り)で、輪郭線は強すぎず陰影と質感で立体感を出してください。全体的に不穏で薄暗い雰囲気ですが、過度なグロテスクさは避けてください。構図は全身または上半身〜3/4身、やや見上げるような迫力のあるポーズにしてください。足元のエフェクトは短く、透明な背景部分に溶け込んで消えたりしないようにしてください。

画質・書き込みは高解像度・高精細を最優先にしてください。鎧の装飾、布の質感やシワ、鱗や毛並み、発光のディテールなど、細部まで省略せず緻密に描き込んでください。全体がぼんやりしたり、のっぺりと簡略化された塗りにならないようにしてください。

重要: 色使いについて。基本色は必ず、木・革・布・鉄・骨・石・毛並み・鱗など、そのキャラクターを構成する素材本来の色(墨黒・灰色・焦げ茶・欅色・黒鉄・古銅・生成り色など、彩度を抑えたアースカラー)にしてください。指定された「アクセントカラー」は、目・紋様・発光部分・金具・一部の装飾など、全体の1〜2割程度の範囲だけに使う差し色です。全身をアクセントカラー一色で塗りつぶすことは絶対にしないでください。1体の中でアクセントカラーの使用箇所が全体の8割を超えている場合は失敗とみなしてください。

以下の2体を、それぞれ指定のアクセントカラーを一部の差し色として効かせて描いてください:`;

const LS_DONE = "onsenEnemyPrompt_done_v1";
const LS_STYLE = "onsenEnemyPrompt_style_v1";
const LS_OPEN = "onsenEnemyPrompt_open_v1";

function enemyId(area, name) { return area + "::" + name; }

let doneSet = new Set(JSON.parse(localStorage.getItem(LS_DONE) || "[]"));
let openSet = new Set(JSON.parse(localStorage.getItem(LS_OPEN) || "[]"));
let selected = []; // array of {area, name, desc}

function saveDone() { localStorage.setItem(LS_DONE, JSON.stringify([...doneSet])); }
function saveOpen() { localStorage.setItem(LS_OPEN, JSON.stringify([...openSet])); }

function allEnemiesFlat() {
  const flat = [];
  AREAS.forEach(a => a.enemies.forEach(([name, desc]) => flat.push({ area: a.area, name, desc })));
  return flat;
}

function updateProgress() {
  const total = allEnemiesFlat().length;
  document.getElementById("progressLabel").textContent = `${doneSet.size}/${total} 完了`;
}

function renderAreaList() {
  const container = document.getElementById("areaList");
  container.innerHTML = "";
  AREAS.forEach(a => {
    const doneCount = a.enemies.filter(([name]) => doneSet.has(enemyId(a.area, name))).length;
    const block = document.createElement("div");
    block.className = "area-block";
    const title = document.createElement("div");
    title.className = "area-title";
    title.innerHTML = `<span>${a.area}</span><span class="count">${doneCount}/${a.enemies.length}</span>`;
    const list = document.createElement("div");
    list.className = "enemy-list" + (openSet.has(a.area) ? " open" : "");
    title.onclick = () => {
      if (openSet.has(a.area)) openSet.delete(a.area); else openSet.add(a.area);
      saveOpen();
      list.classList.toggle("open");
    };
    a.enemies.forEach(([name, desc]) => {
      const id = enemyId(a.area, name);
      const row = document.createElement("div");
      row.className = "enemy-row" + (doneSet.has(id) ? " done" : "") + (selected.some(s => s.area === a.area && s.name === name) ? " picked" : "");
      row.innerHTML = `
        <input type="checkbox" ${doneSet.has(id) ? "checked" : ""}>
        <div><div class="name">${name}</div><div class="desc">${desc}</div></div>
      `;
      const cb = row.querySelector("input");
      cb.onclick = (e) => {
        e.stopPropagation();
        if (cb.checked) doneSet.add(id); else doneSet.delete(id);
        saveDone();
        updateProgress();
        row.classList.toggle("done", cb.checked);
      };
      row.onclick = (e) => {
        if (e.target === cb) return;
        toggleSelect(a.area, name, desc);
      };
      list.appendChild(row);
    });
    block.appendChild(title);
    block.appendChild(list);
    container.appendChild(block);
  });
}

function toggleSelect(area, name, desc) {
  const idx = selected.findIndex(s => s.area === area && s.name === name);
  if (idx >= 0) selected.splice(idx, 1);
  else selected.push({ area, name, desc });
  renderSelected();
  renderAreaList();
  buildPrompt();
}

function renderSelected() {
  const wrap = document.getElementById("selectedChips");
  wrap.innerHTML = "";
  selected.forEach(s => {
    const chip = document.createElement("span");
    chip.className = "selected-chip";
    chip.innerHTML = `${s.name} <button>×</button>`;
    chip.querySelector("button").onclick = () => toggleSelect(s.area, s.name, s.desc);
    wrap.appendChild(chip);
  });
  document.getElementById("selCount").textContent = selected.length ? `(${selected.length}体選択中)` : "";
}

let currentFilename = "";

function buildPrompt() {
  const tpl = document.getElementById("styleTpl").value.trim();
  const lines = selected.map(s => `${s.name} — ${s.desc}`).join("\n");
  document.getElementById("promptOut").value = selected.length ? `${tpl}\n${lines}` : "";
  const hint = document.getElementById("filenameHint");
  const copyFilenameBtn = document.getElementById("copyFilenameBtn");
  if (selected.length) {
    currentFilename = selected.map(s => s.name.replace(/[\\/:*?"<>|]/g, "")).join("_") + ".png";
    hint.textContent = `保存名(上から順): ${currentFilename}`;
    copyFilenameBtn.style.display = "";
  } else {
    currentFilename = "";
    hint.textContent = "";
    copyFilenameBtn.style.display = "none";
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}

document.getElementById("nextTwoBtn").onclick = () => {
  const flat = allEnemiesFlat().filter(e => !doneSet.has(enemyId(e.area, e.name)));
  selected = flat.slice(0, 2);
  renderSelected();
  renderAreaList();
  buildPrompt();
  if (selected.length === 0) showToast("全て完了しています");
};

document.getElementById("clearSelBtn").onclick = () => {
  selected = [];
  renderSelected();
  renderAreaList();
  buildPrompt();
};

document.getElementById("copyBtn").onclick = () => {
  const text = document.getElementById("promptOut").value;
  if (!text) { showToast("選択中のキャラがありません"); return; }
  navigator.clipboard.writeText(text).then(() => showToast("コピーしました"));
};

document.getElementById("copyFilenameBtn").onclick = () => {
  if (!currentFilename) return;
  navigator.clipboard.writeText(currentFilename).then(() => showToast("ファイル名をコピーしました"));
};

document.getElementById("markDoneBtn").onclick = () => {
  if (selected.length === 0) { showToast("選択中のキャラがありません"); return; }
  selected.forEach(s => doneSet.add(enemyId(s.area, s.name)));
  saveDone();
  updateProgress();
  selected = [];
  renderSelected();
  renderAreaList();
  buildPrompt();
  showToast("完了にしました");
};

document.getElementById("styleTpl").addEventListener("input", () => {
  localStorage.setItem(LS_STYLE, document.getElementById("styleTpl").value);
  buildPrompt();
});

document.getElementById("resetTplBtn").onclick = () => {
  document.getElementById("styleTpl").value = DEFAULT_STYLE_TPL;
  localStorage.setItem(LS_STYLE, DEFAULT_STYLE_TPL);
  buildPrompt();
  showToast("デフォルトに戻しました");
};

document.getElementById("styleTpl").value = localStorage.getItem(LS_STYLE) || DEFAULT_STYLE_TPL;
updateProgress();
renderAreaList();
renderSelected();
buildPrompt();
</script>

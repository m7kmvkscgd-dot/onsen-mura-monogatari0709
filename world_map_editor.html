<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温泉村物語 世界地図エディタ</title>
<style>
  :root {
    --bg: #14181b; --surface: #1c2226; --card-bg: #2f3540; --card-border: #5d4d35;
    --gold: #d7b66f; --title: #f3e7c6; --body: #ece8dc; --caption: #b6b0a2;
    --success: #6ea95b; --danger: #c95d54; --info: #7b93b9;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--body); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; line-height: 1.5; overflow: hidden; }
  header { position: sticky; top: 0; z-index: 30; background: linear-gradient(180deg, #1c2226 0%, #171b1e 100%); border-bottom: 1px solid var(--card-border); padding: 10px 16px; }
  .header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 1.02rem; color: var(--title); margin: 0; white-space: nowrap; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-left: auto; }
  button { background: #7b5d36; color: var(--title); border: 1px solid var(--card-border); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; cursor: pointer; transition: filter 0.1s; white-space: nowrap; }
  button:hover { filter: brightness(1.15); }
  button.danger { background: #5a2e28; }
  button.ghost { background: transparent; }
  button.active { background: #3a6ea5; border-color: #5b9bf0; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.72rem; color: var(--caption); padding: 6px 16px 0; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-line { width: 18px; height: 0; border-top: 2px solid; }
  .legend-line.confirmed { border-top-style: solid; border-color: var(--success); }
  .legend-line.proposed { border-top-style: dashed; border-color: var(--gold); }
  .legend-line.dream { border-top-style: dotted; border-color: #a897d8; }

  #canvasWrap { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding-top: 96px; overflow: auto; touch-action: none; }
  #canvas { position: relative; width: 2400px; height: 1500px; transform-origin: 0 0; }
  .zoom-controls { position: fixed; right: 16px; bottom: 16px; z-index: 25; display: flex; flex-direction: column; gap: 6px; }
  .zoom-controls button { width: 40px; height: 40px; font-size: 1.1rem; padding: 0; }
  .zoom-controls #zoomLevel { text-align: center; font-size: 0.68rem; color: var(--caption); background: var(--surface); border: 1px solid var(--card-border); border-radius: 6px; padding: 3px 0; }
  #edgeSvg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #edgeSvg path.edge-hit { pointer-events: stroke; cursor: pointer; }
  #edgeSvg .edge-label { fill: var(--caption); font-size: 11px; paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }

  .node {
    position: absolute; width: 156px; padding: 9px 11px; background: var(--card-bg);
    border: 2px solid var(--card-border); border-radius: 10px; cursor: grab; user-select: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); touch-action: none;
  }
  .node.dragging { cursor: grabbing; z-index: 10; box-shadow: 0 6px 16px rgba(0,0,0,0.6); }
  .node.selected { outline: 2px solid #5b9bf0; outline-offset: 2px; }
  .node.connect-src { outline: 2px solid var(--gold); outline-offset: 2px; }
  .node-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
  .node-name { font-weight: bold; color: var(--title); font-size: 0.88rem; }
  .node-sub { font-size: 0.7rem; color: var(--caption); margin-top: 3px; }
  .node-floor-badge { display: inline-block; margin-top: 4px; font-size: 0.68rem; color: var(--info); background: rgba(255,255,255,0.06); border-radius: 4px; padding: 1px 6px; }

  #panel {
    position: fixed; top: 96px; right: 0; bottom: 0; width: 300px; background: var(--surface);
    border-left: 1px solid var(--card-border); padding: 14px; overflow-y: auto; z-index: 25;
    transform: translateX(100%); transition: transform 0.15s;
  }
  #panel.open { transform: translateX(0); }
  #panel h2 { font-size: 0.9rem; color: var(--title); margin: 0 0 12px; }
  #panel label { display: block; font-size: 0.72rem; color: var(--caption); margin: 10px 0 3px; }
  #panel input[type="text"], #panel input[type="number"], #panel select, #panel textarea {
    width: 100%; background: #0f1214; color: var(--body); border: 1px solid var(--card-border);
    border-radius: 6px; padding: 6px 8px; font-size: 0.82rem; font-family: inherit;
  }
  #panel textarea { min-height: 60px; resize: vertical; }
  #panel .checkbox-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 0.78rem; color: var(--body); }
  #panel .panel-actions { display: flex; gap: 8px; margin-top: 16px; }
  #panel .panel-actions button { flex: 1; }
  #panelClose { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: var(--caption); font-size: 1.1rem; padding: 2px 6px; }

  .hint-bar { position: fixed; left: 16px; bottom: 16px; z-index: 25; background: var(--surface); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px 12px; font-size: 0.75rem; color: var(--caption); max-width: 60vw; }

  @media (max-width: 640px) {
    header { padding: 8px 10px; }
    h1 { font-size: 0.88rem; }
    .toolbar { gap: 6px; }
    .toolbar button { padding: 6px 9px; font-size: 0.72rem; }
    .legend { display: none; }
    #panel { width: 100%; top: auto; bottom: 0; left: 0; right: 0; height: 65vh; border-left: none; border-top: 1px solid var(--card-border); border-radius: 14px 14px 0 0; transform: translateY(100%); }
    #panel.open { transform: translateY(0); }
    .hint-bar { display: none; }
    #canvasWrap { padding-top: 84px; }
  }

  #exportModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  #exportModal.open { display: flex; }
  .export-panel { background: var(--surface); border: 1px solid var(--gold); border-radius: var(--radius); padding: 16px; max-width: 640px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; gap: 10px; }
  .export-panel h2 { margin: 0; font-size: 1rem; color: var(--title); }
  .export-panel textarea { width: 100%; flex: 1; min-height: 300px; background: #0f1214; color: var(--body); border: 1px solid var(--card-border); border-radius: 8px; font-family: monospace; font-size: 0.72rem; padding: 8px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>♨️ 世界地図エディタ</h1>
    <div class="toolbar">
      <button id="addNodeBtn">+ エリア追加</button>
      <button id="connectModeBtn">🔗 接続モード</button>
      <button id="exportBtn">📋 JSON出力</button>
      <button id="resetBtn" class="danger ghost">初期状態に戻す</button>
    </div>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-line confirmed"></span>確定(実装済み)</span>
    <span class="legend-item"><span class="legend-line proposed"></span>仮(実装済みだが未確定要素あり)</span>
    <span class="legend-item"><span class="legend-line dream"></span>構想のみ(未実装)</span>
  </div>
</header>

<div id="canvasWrap">
  <div id="canvas">
    <svg id="edgeSvg"></svg>
  </div>
</div>

<div id="panel">
  <button id="panelClose">✕</button>
  <div id="panelBody"></div>
</div>

<div class="hint-bar">ノード: クリックで編集/ドラッグで移動。接続モード中は2つのノードを順にクリックして線を引く。線をクリックすると分岐点や種別を編集できる。ピンチ、または右下の+/-でズームできる。</div>

<div class="zoom-controls">
  <button id="zoomInBtn">＋</button>
  <div id="zoomLevel">100%</div>
  <button id="zoomOutBtn">－</button>
  <button id="zoomResetBtn" style="font-size:0.6rem;">100%</button>
</div>

<div id="exportModal">
  <div class="export-panel">
    <h2>世界地図データ(JSON)</h2>
    <p style="font-size:0.78rem;color:var(--caption);margin:0;">この内容をコピーしてClaudeに貼り付けてください。x/yは地図上の配置座標(ゲームデータには使いません)。</p>
    <textarea id="exportJson" readonly></textarea>
    <div class="modal-actions">
      <button id="copyJsonBtn">JSONをコピー</button>
      <button id="downloadJsonBtn" class="ghost">ダウンロード</button>
      <button id="closeExportBtn" class="ghost">閉じる</button>
    </div>
  </div>
</div>

    { id: "area_ganpeki", name: "岸壁", category: "misc", status: "dream", floors: null, infinite: false, note: "pipeline/areas.jsonに敵8体分の設計あり、ステージ未実装", x: 1589, y: 1180 },

  ],
  edges: [
    { from: "onsen_mura", to: "forest", type: "confirmed", atFloor: null, label: "" },

    { from: "bamboo", to: "yamabushi", type: "proposed", atFloor: null, label: "自動到着" },
    { from: "ruins", to: "gate", type: "proposed", atFloor: null, label: "" },
    { from: "gate", to: "castle", type: "dream", atFloor: null, label: "鍵が必要(入手経路未実装)" },
    { from: "umimura", to: "coast", type: "confirmed", atFloor: null, label: "" },
    { from: "yamabushi", to: "shugendo", type: "proposed", atFloor: null, label: "" },
    { from: "shugendo", to: "yama", type: "proposed", atFloor: null, label: "" },
    { from: "coast", to: "area_ganpeki", type: "proposed", atFloor: null, label: "" },
    { from: "area_ganpeki", to: "area_yureisen", type: "proposed", atFloor: null, label: "" },
    { from: "area_ganpeki", to: "area_shonyudo", type: "proposed", atFloor: null, label: "" },
    { from: "area_shonyudo", to: "area_kouya", type: "proposed", atFloor: null, label: "" },
    { from: "yamabushi", to: "area_haijiin", type: "proposed", atFloor: null, label: "" },
    { from: "area_haijiin", to: "area_senbontorii", type: "proposed", atFloor: null, label: "" },
    { from: "area_senbontorii", to: "area_gojunotou", type: "proposed", atFloor: null, label: "" },
  ],
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();
let selectedNodeId = null;
let selectedEdgeIdx = null;
let connectMode = false;
let connectSrcId = null;

const canvas = document.getElementById("canvas");
const edgeSvg = document.getElementById("edgeSvg");
const panel = document.getElementById("panel");
const panelBody = document.getElementById("panelBody");
const canvasWrap = document.getElementById("canvasWrap");

// ============ ズーム/パン(ピンチ操作対応) ============
// touch-actionをnoneにしてブラウザのネイティブページズームを止め、代わりにcanvas要素だけを
// transform:scaleでズームさせる(ヘッダーやパネルまで拡大されるのを防ぐため)。2本指ならピンチズーム、
// 1本指ならパン(スクロール)として扱う
let scale = 1;
const MIN_SCALE = 0.35, MAX_SCALE = 2.5;
const pointers = new Map(); // pointerId -> {x, y, onNode}
let pinchState = null; // {initialDist, initialScale, midClientX, midClientY}
let panState = null; // {startScrollLeft, startScrollTop, startClientX, startClientY}
let cancelActiveDrag = null; // 2本目の指が触れた瞬間、進行中のノードドラッグを中断するためのコールバック

function setScale(newScale, midClientX, midClientY) {
  newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
  const contentX = (canvasWrap.scrollLeft + midClientX) / scale;
  const contentY = (canvasWrap.scrollTop + midClientY) / scale;
  scale = newScale;
  canvas.style.transform = `scale(${scale})`;
  canvasWrap.scrollLeft = contentX * scale - midClientX;
  canvasWrap.scrollTop = contentY * scale - midClientY;
  document.getElementById("zoomLevel").textContent = Math.round(scale * 100) + "%";
}

function isNodeTarget(t) { return !!(t && t.closest && t.closest(".node")); }

canvasWrap.addEventListener("pointerdown", (ev) => {
  pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY, onNode: isNodeTarget(ev.target) });
  if (pointers.size === 2) {
    if (cancelActiveDrag) { cancelActiveDrag(); cancelActiveDrag = null; }
    panState = null;
    const pts = Array.from(pointers.values());
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const rect = canvasWrap.getBoundingClientRect();
    pinchState = {
      initialDist: dist, initialScale: scale,
      midClientX: (pts[0].x + pts[1].x) / 2 - rect.left,
      midClientY: (pts[0].y + pts[1].y) / 2 - rect.top,
    };
  } else if (pointers.size === 1 && !isNodeTarget(ev.target)) {
    panState = { startScrollLeft: canvasWrap.scrollLeft, startScrollTop: canvasWrap.scrollTop, startClientX: ev.clientX, startClientY: ev.clientY };
  }
});
canvasWrap.addEventListener("pointermove", (ev) => {
  if (!pointers.has(ev.pointerId)) return;
  const p = pointers.get(ev.pointerId);
  p.x = ev.clientX; p.y = ev.clientY;
  if (pointers.size === 2 && pinchState) {
    const pts = Array.from(pointers.values());
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    setScale(pinchState.initialScale * (dist / pinchState.initialDist), pinchState.midClientX, pinchState.midClientY);
  } else if (pointers.size === 1 && panState) {
    canvasWrap.scrollLeft = panState.startScrollLeft - (ev.clientX - panState.startClientX);
    canvasWrap.scrollTop = panState.startScrollTop - (ev.clientY - panState.startClientY);
  }
});
function releasePointer(ev) {
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinchState = null;
  if (pointers.size < 1) panState = null;
}
canvasWrap.addEventListener("pointerup", releasePointer);
canvasWrap.addEventListener("pointercancel", releasePointer);
canvasWrap.addEventListener("wheel", (ev) => {
  if (!ev.ctrlKey) return; // 通常のホイールスクロールは邪魔しない(トラックパッドのピンチ/Ctrl+ホイールの時だけズーム)
  ev.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  setScale(scale * (1 - ev.deltaY * 0.01), ev.clientX - rect.left, ev.clientY - rect.top);
}, { passive: false });

document.getElementById("zoomInBtn").addEventListener("click", () => {
  const rect = canvasWrap.getBoundingClientRect();
  setScale(scale * 1.2, rect.width / 2, rect.height / 2);
});
document.getElementById("zoomOutBtn").addEventListener("click", () => {
  const rect = canvasWrap.getBoundingClientRect();
  setScale(scale / 1.2, rect.width / 2, rect.height / 2);
});
document.getElementById("zoomResetBtn").addEventListener("click", () => {
  const rect = canvasWrap.getBoundingClientRect();
  setScale(1, rect.width / 2, rect.height / 2);
});

function nodeById(id) { return state.nodes.find((n) => n.id === id); }

function render() {
  canvas.querySelectorAll(".node").forEach((el) => el.remove());
  state.nodes.forEach((n) => {
    const el = document.createElement("div");
    el.className = "node" + (n.id === selectedNodeId ? " selected" : "") + (n.id === connectSrcId ? " connect-src" : "");
    el.style.left = n.x + "px";
    el.style.top = n.y + "px";
    el.style.borderColor = CATEGORY_COLORS[n.category] || "#5d4d35";
    const dotColor = n.status === "confirmed" ? "#6ea95b" : n.status === "proposed" ? "#d7b66f" : "#a897d8";
    el.innerHTML =
      `<div class="node-name"><span class="node-status-dot" style="background:${dotColor}"></span>${escapeHtml(n.name)}</div>` +
      `<div class="node-sub">${CATEGORY_LABELS[n.category] || n.category} ・ ${STATUS_LABELS[n.status] || n.status}</div>` +
      `<div class="node-floor-badge">${n.infinite ? "層数なし(無限)" : n.floors != null ? n.floors + "層" : "―"}</div>`;
    el.dataset.id = n.id;
    attachDrag(el, n);
    canvas.appendChild(el);
  });
  renderEdges();
}

function renderEdges() {
  let svgContent = "";
  state.edges.forEach((e, idx) => {
    const a = nodeById(e.from), b = nodeById(e.to);
    if (!a || !b) return;
    const ax = a.x + 78, ay = a.y + 40, bx = b.x + 78, by = b.y + 40;
    const color = EDGE_COLOR[e.type] || "#888";
    const dash = EDGE_DASH[e.type] || "0";
    const midX = (ax + bx) / 2, midY = (ay + by) / 2;
    let label = e.label || "";
    if (e.atFloor != null) label = (label ? label + " " : "") + e.atFloor + "層目";
    svgContent += `<path d="M${ax},${ay} L${bx},${by}" stroke="${color}" stroke-width="${idx === selectedEdgeIdx ? 4 : 2.5}" stroke-dasharray="${dash}" fill="none"/>`;
    svgContent += `<path class="edge-hit" data-idx="${idx}" d="M${ax},${ay} L${bx},${by}" stroke="transparent" stroke-width="16" fill="none"/>`;
    if (label) svgContent += `<text class="edge-label" x="${midX}" y="${midY - 6}" text-anchor="middle">${escapeHtml(label)}</text>`;
  });
  edgeSvg.innerHTML = svgContent;
  edgeSvg.querySelectorAll(".edge-hit").forEach((el) => {
    el.style.pointerEvents = "stroke";
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      selectedEdgeIdx = parseInt(el.dataset.idx, 10);
      selectedNodeId = null;
      openEdgePanel(selectedEdgeIdx);
      render();
    });
  });
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function attachDrag(el, n) {
  let dragging = false, moved = false, startX, startY, origX, origY, pointerId = null;
  const abort = () => {
    dragging = false;
    el.classList.remove("dragging");
    if (pointerId != null) { try { el.releasePointerCapture(pointerId); } catch (e) {} }
  };
  el.addEventListener("pointerdown", (ev) => {
    if (connectMode || pointers.size >= 1) return; // 2本指目が既に来ている(ピンチ中)場合はドラッグ開始しない
    dragging = true; moved = false; pointerId = ev.pointerId;
    startX = ev.clientX; startY = ev.clientY; origX = n.x; origY = n.y;
    el.setPointerCapture(ev.pointerId);
    el.classList.add("dragging");
    cancelActiveDrag = abort;
  });
  el.addEventListener("pointermove", (ev) => {
    if (!dragging) return;
    const dx = (ev.clientX - startX) / scale, dy = (ev.clientY - startY) / scale;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    n.x = Math.max(0, origX + dx);
    n.y = Math.max(0, origY + dy);
    el.style.left = n.x + "px";
    el.style.top = n.y + "px";
    renderEdges();
  });
  el.addEventListener("pointerup", (ev) => {
    if (!dragging) return;
    dragging = false;
    cancelActiveDrag = null;
    el.classList.remove("dragging");
    if (moved) { saveState(); }
    else { handleNodeClick(n.id); }
  });
  el.addEventListener("click", (ev) => {
    ev.stopPropagation();
    if (connectMode) handleNodeClick(n.id); // 接続モード中はドラッグ判定が働かないため、クリックで直接処理する
  });
}

function handleNodeClick(id) {
  if (connectMode) {
    if (!connectSrcId) {
      connectSrcId = id;
      render();
      return;
    }
    if (connectSrcId === id) { connectSrcId = null; render(); return; }
    state.edges.push({ from: connectSrcId, to: id, type: "proposed", atFloor: null, label: "" });
    saveState();
    const newIdx = state.edges.length - 1;
    connectSrcId = null;
    selectedEdgeIdx = newIdx;
    selectedNodeId = null;
    render();
    openEdgePanel(newIdx);
    return;
  }
  selectedNodeId = id;
  selectedEdgeIdx = null;
  render();
  openNodePanel(id);
}

function openNodePanel(id) {
  const n = nodeById(id);
  if (!n) return;
  panelBody.innerHTML = `
    <h2>エリア編集</h2>
    <label>表示名</label>
    <input type="text" id="f_name" value="${escapeHtml(n.name)}">
    <label>ID(半角英数字、dungeon.jsのステージキー候補)</label>
    <input type="text" id="f_id" value="${escapeHtml(n.id)}">
    <label>カテゴリ(色分け)</label>
    <select id="f_category">${Object.keys(CATEGORY_LABELS).map((k) => `<option value="${k}" ${k === n.category ? "selected" : ""}>${CATEGORY_LABELS[k]}</option>`).join("")}</select>
    <label>状態</label>
    <select id="f_status">${Object.keys(STATUS_LABELS).map((k) => `<option value="${k}" ${k === n.status ? "selected" : ""}>${STATUS_LABELS[k]}</option>`).join("")}</select>
    <label>層数</label>
    <input type="number" id="f_floors" min="1" value="${n.floors != null ? n.floors : ""}" ${n.infinite ? "disabled" : ""}>
    <div class="checkbox-row"><input type="checkbox" id="f_infinite" ${n.infinite ? "checked" : ""}><label style="margin:0;" for="f_infinite">層数なし(村・無限エリアなど)</label></div>
    <label>メモ</label>
    <textarea id="f_note">${escapeHtml(n.note || "")}</textarea>
    <div class="panel-actions">
      <button id="applyNodeBtn">適用</button>
      <button id="deleteNodeBtn" class="danger">削除</button>
    </div>
  `;
  panel.classList.add("open");
  document.getElementById("f_infinite").addEventListener("change", (ev) => {
    document.getElementById("f_floors").disabled = ev.target.checked;
  });
  document.getElementById("applyNodeBtn").addEventListener("click", () => {
    const newId = document.getElementById("f_id").value.trim() || n.id;
    if (newId !== n.id && state.nodes.some((x) => x.id === newId)) { alert("そのIDは既に使われています"); return; }
    if (newId !== n.id) {
      state.edges.forEach((e) => { if (e.from === n.id) e.from = newId; if (e.to === n.id) e.to = newId; });
      n.id = newId;
    }
    n.name = document.getElementById("f_name").value.trim() || n.name;
    n.category = document.getElementById("f_category").value;
    n.status = document.getElementById("f_status").value;
    n.infinite = document.getElementById("f_infinite").checked;
    const fv = document.getElementById("f_floors").value;
    n.floors = n.infinite ? null : (fv ? parseInt(fv, 10) : null);
    n.note = document.getElementById("f_note").value;
    saveState();
    render();
  });
  document.getElementById("deleteNodeBtn").addEventListener("click", () => {
    if (!confirm(`「${n.name}」を削除しますか?つながる線も削除されます`)) return;
    state.nodes = state.nodes.filter((x) => x.id !== n.id);
    state.edges = state.edges.filter((e) => e.from !== n.id && e.to !== n.id);
    selectedNodeId = null;
    saveState();
    closePanel();
    render();
  });
}

function openEdgePanel(idx) {
  const e = state.edges[idx];
  if (!e) return;
  const a = nodeById(e.from), b = nodeById(e.to);
  panelBody.innerHTML = `
    <h2>接続編集</h2>
    <div style="font-size:0.8rem;color:var(--caption);">${escapeHtml(a ? a.name : e.from)} → ${escapeHtml(b ? b.name : e.to)}</div>
    <label>種別</label>
    <select id="e_type">${Object.keys(STATUS_LABELS).map((k) => `<option value="${k}" ${k === e.type ? "selected" : ""}>${STATUS_LABELS[k]}</option>`).join("")}</select>
    <label>分岐する層(無ければ空欄)</label>
    <input type="number" id="e_atFloor" min="1" value="${e.atFloor != null ? e.atFloor : ""}">
    <label>ラベル(任意のメモ)</label>
    <input type="text" id="e_label" value="${escapeHtml(e.label || "")}">
    <div class="panel-actions">
      <button id="applyEdgeBtn">適用</button>
      <button id="deleteEdgeBtn" class="danger">削除</button>
    </div>
  `;
  panel.classList.add("open");
  document.getElementById("applyEdgeBtn").addEventListener("click", () => {
    e.type = document.getElementById("e_type").value;
    const fv = document.getElementById("e_atFloor").value;
    e.atFloor = fv ? parseInt(fv, 10) : null;
    e.label = document.getElementById("e_label").value;
    saveState();
    render();
  });
  document.getElementById("deleteEdgeBtn").addEventListener("click", () => {
    state.edges.splice(idx, 1);
    selectedEdgeIdx = null;
    saveState();
    closePanel();
    render();
  });
}

function closePanel() {
  panel.classList.remove("open");
  selectedNodeId = null;
  selectedEdgeIdx = null;
}
document.getElementById("panelClose").addEventListener("click", () => { closePanel(); render(); });

document.getElementById("canvas").addEventListener("click", (ev) => {
  if (ev.target.id === "canvas" || ev.target.id === "edgeSvg") { closePanel(); render(); }
});

document.getElementById("addNodeBtn").addEventListener("click", () => {
  const wrap = document.getElementById("canvasWrap");
  const x = wrap.scrollLeft + 200, y = wrap.scrollTop + 200;
  const id = "area_" + Date.now();
  state.nodes.push({ id, name: "新エリア", category: "misc", status: "dream", floors: 10, infinite: false, note: "", x, y });
  saveState();
  render();
  handleNodeClick(id);
});

document.getElementById("connectModeBtn").addEventListener("click", (ev) => {
  connectMode = !connectMode;
  connectSrcId = null;
  ev.target.classList.toggle("active", connectMode);
  closePanel();
  render();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("編集内容をすべて破棄して初期状態に戻しますか?")) return;
  state = JSON.parse(JSON.stringify(SEED_DATA));
  saveState();
  closePanel();
  render();
});

document.getElementById("exportBtn").addEventListener("click", () => {
  document.getElementById("exportJson").value = JSON.stringify(state, null, 2);
  document.getElementById("exportModal").classList.add("open");
});
document.getElementById("closeExportBtn").addEventListener("click", () => {
  document.getElementById("exportModal").classList.remove("open");
});
document.getElementById("copyJsonBtn").addEventListener("click", () => {
  const ta = document.getElementById("exportJson");
  ta.select();
  navigator.clipboard && navigator.clipboard.writeText(ta.value).catch(() => document.execCommand("copy"));
  if (!navigator.clipboard) document.execCommand("copy");
});
document.getElementById("downloadJsonBtn").addEventListener("click", () => {
  const blob = new Blob([document.getElementById("exportJson").value], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "world_map.json";
  a.click();
  URL.revokeObjectURL(url);
});

render();
</script>
</body>
</html>

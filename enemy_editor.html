<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温泉村物語 敵配置・敵データエディタ</title>
<style>
  :root {
    --bg: #14181b; --surface: #1c2226; --card-bg: #2f3540; --card-border: #5d4d35;
    --gold: #d7b66f; --title: #f3e7c6; --body: #ece8dc; --caption: #b6b0a2;
    --success: #6ea95b; --danger: #c95d54; --info: #7b93b9; --warn: #d9a25f;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--body); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; line-height: 1.5; }
  header { position: sticky; top: 0; z-index: 20; background: linear-gradient(180deg, #1c2226 0%, #171b1e 100%); border-bottom: 1px solid var(--card-border); padding: 10px 16px; }
  .header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 1.0rem; color: var(--title); margin: 0; white-space: nowrap; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-left: auto; }
  input[type="search"], input[type="text"], input[type="number"] { background: var(--surface); border: 1px solid var(--card-border); color: var(--body); border-radius: 8px; padding: 7px 10px; font-size: 0.85rem; }
  input[type="search"] { width: 160px; }
  button { background: #7b5d36; color: var(--title); border: 1px solid var(--card-border); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; cursor: pointer; transition: filter 0.1s; -webkit-tap-highlight-color: transparent; }
  button:hover { filter: brightness(1.15); }
  button.danger { background: #5a2e28; }
  button.ghost { background: transparent; }
  button.small { padding: 4px 8px; font-size: 0.72rem; }
  #editCount { color: var(--gold); font-weight: bold; font-size: 0.8rem; white-space: nowrap; }
  nav#stageTabs { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 0; }
  .stage-tab { flex-shrink: 0; display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--card-border); border-bottom: none; border-radius: 10px 10px 0 0; padding: 7px 12px; cursor: pointer; color: var(--caption); font-size: 0.82rem; white-space: nowrap; }
  .stage-tab.active { background: var(--card-bg); color: var(--title); border-color: var(--gold); }
  .stage-tab .count-badge { font-size: 0.68rem; color: var(--caption); background: rgba(255,255,255,0.08); border-radius: 8px; padding: 1px 6px; }
  .stage-tab.empty-stage .count-badge { color: #fff; background: var(--danger); }
  .stage-tab .tab-edit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: none; }
  .stage-tab.has-edits .tab-edit-dot { display: inline-block; }
  main { max-width: 720px; margin: 0 auto; padding: 12px 10px 40px; }

  .empty-banner { background: #3a2a1c; border: 1px solid var(--warn); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; font-size: 0.78rem; color: #f0d9b5; }
  .empty-banner b { color: var(--warn); }

  section.block { margin-bottom: 16px; }
  .block-title { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin: 4px 0 8px; display: flex; align-items: center; gap: 8px; }
  .block-hint { font-size: 0.7rem; color: var(--caption); font-weight: normal; }

  /* --- 道の出現確率テーブル --- */
  .path-list { display: flex; flex-direction: column; gap: 6px; }
  .path-row { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 7px 9px; }
  .path-row.edited { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .path-row-head { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .path-row-head input[type="text"] { flex: 1; min-width: 0; font-size: 0.8rem; padding: 4px 6px; }
  .path-row-head .path-icon-input { width: 40px; text-align: center; flex: none; }
  .path-fields { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .path-field { display: flex; flex-direction: column; gap: 2px; }
  .path-field label { font-size: 0.62rem; color: var(--caption); }
  .path-field input { width: 100%; font-size: 0.78rem; padding: 4px 5px; }

  /* --- 敵カード --- */
  .enemy-list { display: flex; flex-direction: column; gap: 8px; }
  .enemy-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
  .enemy-card.edited { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .enemy-card.is-new { border-color: var(--success); box-shadow: 0 0 0 1px var(--success) inset; }
  .enemy-card > summary { list-style: none; cursor: pointer; padding: 9px 10px; display: flex; align-items: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
  .enemy-card > summary::-webkit-details-marker { display: none; }
  .enemy-thumb { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; background: rgba(255,255,255,0.05); flex-shrink: 0; }
  .enemy-summary-main { flex: 1; min-width: 0; }
  .enemy-summary-name { font-size: 0.88rem; font-weight: bold; color: var(--title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .enemy-summary-sub { font-size: 0.68rem; color: var(--caption); display: flex; gap: 6px; flex-wrap: wrap; margin-top: 1px; }
  .enemy-badges { display: flex; gap: 3px; flex-shrink: 0; }
  .enemy-badge { font-size: 0.62rem; border-radius: 5px; padding: 1px 5px; background: rgba(255,255,255,0.08); color: var(--caption); }
  .enemy-badge.boss { background: rgba(201,93,84,0.25); color: #f0a89f; }
  .enemy-edit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; display: none; }
  .enemy-card.edited .enemy-edit-dot, .enemy-card.is-new .enemy-edit-dot { display: inline-block; }
  .enemy-card.is-new .enemy-edit-dot { background: var(--success); }
  .enemy-chevron { flex-shrink: 0; color: var(--caption); font-size: 0.65rem; transition: transform 0.15s; }
  .enemy-card[open] .enemy-chevron { transform: rotate(90deg); }

  .enemy-body { padding: 4px 10px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .field-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
  .field-row label { font-size: 0.72rem; color: var(--caption); flex-shrink: 0; width: 62px; }
  .field-row input[type="text"] { flex: 1; }
  .id-caption { font-size: 0.68rem; color: var(--caption); font-family: monospace; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 6px 0 10px; }
  .stat-field { display: flex; flex-direction: column; gap: 2px; }
  .stat-field label { font-size: 0.64rem; color: var(--caption); }
  .stat-field input { width: 100%; padding: 5px 6px; font-size: 0.8rem; }

  .flag-row { display: flex; flex-wrap: wrap; gap: 4px 10px; margin: 6px 0 10px; }
  .flag-chip { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--caption); }
  .flag-chip input { width: 14px; height: 14px; }

  details.sub-detail { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; margin: 6px 0; }
  details.sub-detail > summary { cursor: pointer; padding: 7px 9px; font-size: 0.76rem; color: var(--info); list-style: none; display: flex; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
  details.sub-detail > summary::-webkit-details-marker { display: none; }
  details.sub-detail > summary .sub-summary-text { color: var(--caption); font-weight: normal; }
  .sub-body { padding: 4px 9px 10px; }
  .sub-field-row { display: flex; align-items: center; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  .sub-field-row label { font-size: 0.68rem; color: var(--caption); width: 58px; flex-shrink: 0; }
  .sub-field-row input[type="text"], .sub-field-row input[type="number"], .sub-field-row select { flex: 1; min-width: 70px; padding: 5px 6px; font-size: 0.76rem; }
  .sub-field-row textarea { flex: 1; min-width: 100%; padding: 5px 6px; font-size: 0.76rem; background: var(--surface); border: 1px solid var(--card-border); color: var(--body); border-radius: 6px; font-family: inherit; resize: vertical; min-height: 40px; }
  .extra-effect-block { margin: 6px 0; padding: 6px 8px; background: rgba(0,0,0,0.12); border-radius: 6px; }
  .extra-effect-block textarea { width: 100%; margin-top: 4px; padding: 5px 6px; font-size: 0.76rem; background: var(--surface); border: 1px solid var(--card-border); color: var(--body); border-radius: 6px; font-family: inherit; resize: vertical; min-height: 36px; box-sizing: border-box; }
  .enable-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: var(--gold); margin-bottom: 4px; }

  .card-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }

  .add-enemy-btn { width: 100%; margin-top: 10px; padding: 10px; font-size: 0.82rem; }

  .search-list { display: flex; flex-direction: column; gap: 8px; }
  .empty-hint { color: var(--caption); font-size: 0.85rem; text-align: center; padding: 30px 10px; }

  #exportModal, #addModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  #exportModal.open, #addModal.open { display: flex; }
  .panel { background: var(--surface); border: 1px solid var(--gold); border-radius: var(--radius); padding: 16px; max-width: 640px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
  .panel h2 { margin: 0; font-size: 1rem; color: var(--title); }
  .panel textarea { width: 100%; flex: 1; min-height: 200px; background: #0f1214; color: var(--body); border: 1px solid var(--card-border); border-radius: 8px; font-family: monospace; font-size: 0.72rem; padding: 8px; }
  .export-summary { font-size: 0.8rem; background: #0f1214; border-radius: 8px; padding: 8px 10px; border: 1px solid var(--card-border); }
  .export-summary div { margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .panel label.form-label { font-size: 0.78rem; color: var(--caption); display: block; margin-bottom: 3px; }
  .panel input[type="text"] { width: 100%; margin-bottom: 10px; }
  .panel input[type="search"] { width: 100%; margin-bottom: 10px; }
  .pick-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .pick-row { display: flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 8px 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .pick-row:active { border-color: var(--gold); }
  .pick-row img { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
  .pick-row-main { flex: 1; min-width: 0; }
  .pick-row-name { font-size: 0.85rem; color: var(--title); }
  .pick-row-sub { font-size: 0.68rem; color: var(--caption); }
  .also-appears { font-size: 0.7rem; color: var(--info); margin: 4px 0; }
  .also-appears-badge { font-size: 0.62rem; color: var(--info); background: rgba(123,147,185,0.18); border-radius: 5px; padding: 1px 5px; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>♨️ 敵配置・敵データエディタ</h1>
    <div class="toolbar">
      <input type="search" id="searchBox" placeholder="妖怪名で検索...">
      <span id="editCount">編集: 0件</span>
      <button id="exportBtn">📋 エクスポート</button>
      <button id="resetAllBtn" class="danger ghost">全て元に戻す</button>
    </div>
  </div>
  <nav id="stageTabs"></nav>
</header>
<main id="mainArea"></main>

<div id="addModal">
  <div class="panel">
    <h2 id="addModalTitle">新しい妖怪を配置</h2>
    <div>
      <label class="form-label">ID(半角英数字とアンダースコアのみ。後から変更不可)</label>
      <input type="text" id="addIdInput" placeholder="例: kawa_uso">
      <label class="form-label">名前(表示名)</label>
      <input type="text" id="addNameInput" placeholder="例: 川獺">
    </div>
    <div class="modal-actions">
      <button id="addConfirmBtn">追加する</button>
      <button id="addCancelBtn" class="ghost">キャンセル</button>
    </div>
  </div>
</div>

<div id="pickModal">
  <div class="panel">
    <h2>既存の妖怪から複製して配置</h2>
    <input type="search" id="pickSearchBox" placeholder="妖怪名で検索...">
    <div id="pickList" class="pick-list"></div>
    <div class="modal-actions">
      <button id="pickCancelBtn" class="ghost">キャンセル</button>
    </div>
  </div>
</div>

<div id="exportModal">
  <div class="panel">
    <h2>編集内容のエクスポート</h2>
    <div id="exportSummary" class="export-summary"></div>
    <textarea id="exportJson" readonly></textarea>
    <div class="modal-actions">
      <button id="copyJsonBtn">JSONをコピー</button>
      <button id="closeExportBtn" class="ghost">閉じる</button>
    </div>
  </div>
</div>

function saveEdits() { localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); }

function deepEqual(a, b) {
  if (a === b) return true;
  if (typeof a !== typeof b) return false;
  if (a && b && typeof a === "object") {
    const ka = Object.keys(a), kb = Object.keys(b);
    if (ka.length !== kb.length) return false;
    return ka.every((k) => deepEqual(a[k], b[k]));
  }
  return false;
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ==== 敵データのアクセサ ====
function isNewEnemy(id) { return !!edits.newEnemies[id]; }
function isRemoved(id) { return !!edits.removed[id]; }
function baseEnemy(id) { return isNewEnemy(id) ? edits.newEnemies[id] : ENEMY_DATA[id]; }
function getEnemy(id) {
  const base = baseEnemy(id);
  if (!base) return null;
  if (isNewEnemy(id)) return base; // 新規追加分はedits.newEnemies自体が現在値
  const overrides = edits.fields[id] || {};
  return Object.assign({}, base, overrides);
}
function effectiveStage(id) { const e = getEnemy(id); return (e && e.stage) || "forest"; }

function setField(id, field, value) {
  if (isNewEnemy(id)) {
    if (value === undefined) delete edits.newEnemies[id][field];
    else edits.newEnemies[id][field] = value;
    saveEdits();
    return;
  }
  const original = ENEMY_DATA[id][field];
  if (deepEqual(value, original) || (value === undefined && original === undefined)) {
    if (edits.fields[id]) {
      delete edits.fields[id][field];
      if (Object.keys(edits.fields[id]).length === 0) delete edits.fields[id];
    }
  } else {
    edits.fields[id] = edits.fields[id] || {};
    edits.fields[id][field] = value;
  }
  saveEdits();
}
function isEditedEnemy(id) {
  if (isNewEnemy(id)) return true;
  return !!(edits.fields[id] && Object.keys(edits.fields[id]).length > 0);
}
function countEnemyEdits() {
  let n = 0;
  Object.values(edits.fields).forEach((f) => { n += Object.keys(f).length; });
  n += Object.keys(edits.newEnemies).length;
  n += Object.keys(edits.removed).length;
  return n;
}
function countPathEdits() {
  let n = 0;
  Object.values(edits.pathFields).forEach((paths) => Object.values(paths).forEach((f) => { n += Object.keys(f).length; }));
  return n;
}
function countEdits() { return countEnemyEdits() + countPathEdits(); }

function allEnemyIds() {
  return Object.keys(ENEMY_DATA).filter((id) => !isRemoved(id)).concat(Object.keys(edits.newEnemies));
}
function enemiesForStage(stageId) {
  return allEnemyIds().filter((id) => effectiveStage(id) === stageId)
    .map((id) => ({ id, e: getEnemy(id) }))
    .sort((a, b) => (a.e.minFloor || 0) - (b.e.minFloor || 0));
}

// 同じ画像(=同じ見た目の妖怪)を使っている他の妖怪が、どのエリアに配置されているかを調べる。
// data.js内の既存の慣習(例: 洞窟のcave_tsuchigumoは森のtsuchigumoと同じ画像を使い回している)を
// そのまま手がかりにして「他エリアにも同じ妖怪がいるかどうか」を検出する
function otherStagesForImage(image, excludeId) {
  if (!image) return [];
  const stageIds = new Set();
  allEnemyIds().forEach((id) => {
    if (id === excludeId) return;
    const e = getEnemy(id);
    if (e.image === image) stageIds.add(effectiveStage(id));
  });
  return STAGES.filter((s) => stageIds.has(s.id));
}

// ==== 道の出現確率アクセサ ====
function getPathValue(stageId, pathKey, field) {
  const override = edits.pathFields[stageId] && edits.pathFields[stageId][pathKey] && edits.pathFields[stageId][pathKey][field];
  if (override !== undefined) return override.v;
  return PATH_DATA[stageId][pathKey][field];
}
function setPathField(stageId, pathKey, field, value) {
  const original = PATH_DATA[stageId][pathKey][field];
  edits.pathFields[stageId] = edits.pathFields[stageId] || {};
  edits.pathFields[stageId][pathKey] = edits.pathFields[stageId][pathKey] || {};
  if (deepEqual(value, original)) {
    delete edits.pathFields[stageId][pathKey][field];
    if (Object.keys(edits.pathFields[stageId][pathKey]).length === 0) delete edits.pathFields[stageId][pathKey];
    if (Object.keys(edits.pathFields[stageId]).length === 0) delete edits.pathFields[stageId];
  } else {
    edits.pathFields[stageId][pathKey][field] = { v: value };
  }
  saveEdits();
}
function isEditedPathRow(stageId, pathKey) {
  return !!(edits.pathFields[stageId] && edits.pathFields[stageId][pathKey] && Object.keys(edits.pathFields[stageId][pathKey]).length > 0);
}
function stageHasPathEdits(stageId) { return !!(edits.pathFields[stageId] && Object.keys(edits.pathFields[stageId]).length > 0); }

// ==== 新規追加・複製・削除 ====
function generateDefaultFloorRange(stageId) {
  // 未実装ステージはまず1〜10階想定の下限値で置く。既存の敵があれば最大maxFloorに揃える
  const list = enemiesForStage(stageId);
  if (list.length === 0) return { minFloor: 1, maxFloor: 10 };
  const maxF = Math.max(...list.map((x) => x.e.maxFloor || 10));
  return { minFloor: 1, maxFloor: maxF };
}
function createBlankEnemy(id, ja, stageId) {
  const range = generateDefaultFloorRange(stageId);
  return {
    id, ja, image: "assets/enemies/" + id + ".png",
    hp: 20, atk: 8, def: 4, spd: 6, goldMin: 10, goldMax: 18, xp: 12,
    minFloor: range.minFloor, maxFloor: range.maxFloor,
    stage: stageId,
    bigAttack: { name: "大技", mult: 1.0 },
  };
}
function idExists(id) { return !!ENEMY_DATA[id] || !!edits.newEnemies[id]; }
function validId(id) { return /^[a-z][a-z0-9_]*$/.test(id); }

    `;
    row.querySelector('[data-f="icon"]').addEventListener("input", (ev) => { setPathField(stageId, pathKey, "icon", ev.target.value); row.classList.toggle("edited", isEditedPathRow(stageId, pathKey)); refreshEditCount(); });
    row.querySelector('[data-f="label"]').addEventListener("input", (ev) => { setPathField(stageId, pathKey, "label", ev.target.value); row.classList.toggle("edited", isEditedPathRow(stageId, pathKey)); refreshEditCount(); });
    row.querySelector('[data-f="battle"]').addEventListener("input", (ev) => { const v = ev.target.value === "" ? 0 : Math.max(0, Math.min(100, Number(ev.target.value))) / 100; setPathField(stageId, pathKey, "battle", Math.round(v * 10000) / 10000); row.classList.toggle("edited", isEditedPathRow(stageId, pathKey)); refreshEditCount(); });
    row.querySelector('[data-f="gold"]').addEventListener("input", (ev) => { const v = ev.target.value === "" ? 0 : Math.max(0, Math.min(100, Number(ev.target.value))) / 100; setPathField(stageId, pathKey, "gold", Math.round(v * 10000) / 10000); row.classList.toggle("edited", isEditedPathRow(stageId, pathKey)); refreshEditCount(); });
    row.querySelector('[data-f="ambushChance"]').addEventListener("input", (ev) => {
      if (ev.target.value === "") { setPathField(stageId, pathKey, "ambushChance", undefined); }

    });
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

// ==== レンダリング: 大技/追加効果/弱点のサブセクション ====
function buildDebuffFields(prefix, current, onChange) {
  const box = document.createElement("div");
  const type = (current && current.type) || "";
  box.innerHTML = `
    <div class="sub-field-row">
      <label>種類</label>
      <select data-f="type">
        <option value="">なし</option>
        ${DEBUFF_TYPES.map((t) => `<option value="${t}"${t === type ? " selected" : ""}>${DEBUFF_TYPE_LABELS[t]}</option>`).join("")}
      </select>
    </div>
    <div class="debuff-detail-fields" style="${type ? "" : "display:none;"}">
      <div class="sub-field-row"><label>確率</label><input type="number" step="0.05" min="0" max="1" data-f="chance" value="${current && current.chance !== undefined ? current.chance : ""}"></div>
      <div class="sub-field-row"><label>値</label><input type="number" step="0.01" data-f="value" value="${current && current.value !== undefined ? current.value : ""}"></div>
      <div class="sub-field-row"><label>ターン</label><input type="number" min="0" data-f="turns" value="${current && current.turns !== undefined ? current.turns : ""}"></div>
      <div class="sub-field-row"><label>ターン最小</label><input type="number" min="0" data-f="turnsMin" value="${current && current.turnsMin !== undefined ? current.turnsMin : ""}"></div>
      <div class="sub-field-row"><label>ターン最大</label><input type="number" min="0" data-f="turnsMax" value="${current && current.turnsMax !== undefined ? current.turnsMax : ""}"></div>
    </div>
  `;
  function collect() {
    const t = box.querySelector('[data-f="type"]').value;
    if (!t) return undefined;
    const out = { type: t };
    ["chance", "value", "turns", "turnsMin", "turnsMax"].forEach((f) => {
      const v = box.querySelector(`[data-f="${f}"]`).value;
      if (v !== "") out[f] = Number(v);
    });
    return out;
  }
  box.querySelector('[data-f="type"]').addEventListener("change", (ev) => {
    box.querySelector(".debuff-detail-fields").style.display = ev.target.value ? "" : "none";
    onChange(collect());
  });
  box.querySelectorAll(".debuff-detail-fields input").forEach((inp) => inp.addEventListener("input", () => onChange(collect())));
  return box;
}

function renderBigAttackSub(id, enemy) {

  det.className = "sub-detail";
  const oh = enemy.onHitInflict || null;
  det.innerHTML = `<summary>通常攻撃の追加効果(onHitInflict) <span class="sub-summary-text">${oh ? ONHIT_TYPE_LABELS[oh.type] + " " + Math.round((oh.chance || 0) * 100) + "%" : "なし"}</span></summary>`;
  const body = document.createElement("div");
  body.className = "sub-body";
  body.innerHTML = `<div class="enable-toggle"><input type="checkbox" id="oh-enable-${id}" ${oh ? "checked" : ""}> 通常攻撃時に状態異常を付与する</div><div class="oh-fields" style="${oh ? "" : "display:none;"}"></div>`;
  const fieldsBox = body.querySelector(".oh-fields");
  function buildFields(cur) {
    fieldsBox.innerHTML = `
      <div class="sub-field-row"><label>種類</label><select data-f="type">${ONHIT_TYPES.map((t) => `<option value="${t}"${cur && cur.type === t ? " selected" : ""}>${ONHIT_TYPE_LABELS[t]}</option>`).join("")}</select></div>
      <div class="sub-field-row"><label>確率</label><input type="number" step="0.05" min="0" max="1" data-f="chance" value="${cur && cur.chance !== undefined ? cur.chance : 0.3}"></div>
      <div class="sub-field-row"><label>値</label><input type="number" step="1" data-f="value" value="${cur && cur.value !== undefined ? cur.value : ""}"></div>
      <div class="sub-field-row"><label>値最小</label><input type="number" step="1" data-f="valueMin" value="${cur && cur.valueMin !== undefined ? cur.valueMin : ""}"></div>
      <div class="sub-field-row"><label>値最大</label><input type="number" step="1" data-f="valueMax" value="${cur && cur.valueMax !== undefined ? cur.valueMax : ""}"></div>
      <div class="sub-field-row"><label>ターン最小</label><input type="number" step="1" data-f="turnsMin" value="${cur && cur.turnsMin !== undefined ? cur.turnsMin : ""}"></div>
      <div class="sub-field-row"><label>ターン最大</label><input type="number" step="1" data-f="turnsMax" value="${cur && cur.turnsMax !== undefined ? cur.turnsMax : ""}"></div>
      <div class="sub-field-row"><label class="flag-chip" style="width:auto;"><input type="checkbox" data-f="stacking" ${cur && cur.stacking ? "checked" : ""}> 蓄積型(stacking)</label></div>
    `;
    fieldsBox.querySelectorAll("input, select").forEach((inp) => inp.addEventListener("input", commit));
  }
  function collect() {
    const type = fieldsBox.querySelector('[data-f="type"]').value;
    const out = { type };
    ["chance", "value", "valueMin", "valueMax", "turnsMin", "turnsMax"].forEach((f) => {
      const v = fieldsBox.querySelector(`[data-f="${f}"]`).value;
      if (v !== "") out[f] = Number(v);
    });
    if (fieldsBox.querySelector('[data-f="stacking"]').checked) out.stacking = true;
    return out;
  }
  function commit() {
    const enabled = body.querySelector(`#oh-enable-${id}`).checked;
    const out = enabled ? collect() : undefined;
    setField(id, "onHitInflict", out);
    det.querySelector("summary").innerHTML = `通常攻撃の追加効果(onHitInflict) <span class="sub-summary-text">${out ? ONHIT_TYPE_LABELS[out.type] + " " + Math.round((out.chance || 0) * 100) + "%" : "なし"}</span>`;
    onAnyFieldChanged(id);
  }
  body.querySelector(`#oh-enable-${id}`).addEventListener("change", (ev) => {
    fieldsBox.style.display = ev.target.checked ? "" : "none";
    if (ev.target.checked && !fieldsBox.hasChildNodes()) buildFields(null);
    commit();
  });
  if (oh) buildFields(oh);
  det.appendChild(body);
  return det;
}

function renderWeaknessSub(id, enemy) {
  const det = document.createElement("details");
  det.className = "sub-detail";
  const w = enemy.weakness || null;
  det.innerHTML = `<summary>弱点(図鑑表示) <span class="sub-summary-text">${w ? WEAKNESS_TYPE_LABELS[w.type] : "未設定"}</span></summary>`;
  const body = document.createElement("div");
  body.className = "sub-body";
  body.innerHTML = `<div class="enable-toggle"><input type="checkbox" id="wk-enable-${id}" ${w ? "checked" : ""}> 弱点を設定する</div><div class="wk-fields" style="${w ? "" : "display:none;"}"></div>`;
  const fieldsBox = body.querySelector(".wk-fields");
  function buildFields(cur) {
    const type = (cur && cur.type) || "bleed";
    const showExtra = type !== "flying" && type !== "spirit"; // 飛行/霊力は「状態異常を受けている間」という前提が無いため追加効果の対象外
    const effects = (cur && cur.effects) || [];
    const customChecked = !!(cur && cur.customEffect);
    fieldsBox.innerHTML = `
      <div class="sub-field-row"><label>種類</label><select data-f="type">${WEAKNESS_TYPES.map((t) => `<option value="${t}"${type === t ? " selected" : ""}>${WEAKNESS_TYPE_LABELS[t]}</option>`).join("")}</select></div>
      <div class="extra-effect-block" style="${showExtra ? "" : "display:none;"}">
        <div class="sub-field-row" style="margin-bottom:2px;"><label style="width:auto;">状態異常を受けている間(常時ダメージ2倍に加えて)</label></div>
        ${WEAKNESS_EXTRA_EFFECTS.map((f) => `<label class="flag-chip" style="display:flex;"><input type="checkbox" data-effect="${f}" ${effects.includes(f) ? "checked" : ""}> ${WEAKNESS_EXTRA_EFFECT_LABELS[f]}</label>`).join("")}
        <label class="flag-chip" style="display:flex;"><input type="checkbox" data-effect="custom" ${customChecked ? "checked" : ""}> その他</label>
        <textarea data-f="customEffect" placeholder="自由記入(例: 毒状態の間、大技が使えなくなる)" style="${customChecked ? "" : "display:none;"}">${escapeHtml((cur && cur.customEffect) || "")}</textarea>
      </div>
      <div class="sub-field-row"><label>説明文</label><textarea data-f="flavor">${escapeHtml((cur && cur.flavor) || "")}</textarea></div>
    `;
    fieldsBox.querySelector('[data-f="type"]').addEventListener("change", (ev) => {
      const t = ev.target.value;
      fieldsBox.querySelector(".extra-effect-block").style.display = (t !== "flying" && t !== "spirit") ? "" : "none";
      commit();
    });
    fieldsBox.querySelectorAll('[data-effect]').forEach((cb) => cb.addEventListener("change", (ev) => {
      if (ev.target.dataset.effect === "custom") fieldsBox.querySelector('[data-f="customEffect"]').style.display = ev.target.checked ? "" : "none";
      commit();
    }));
    fieldsBox.querySelectorAll('[data-f="customEffect"], [data-f="flavor"]').forEach((inp) => inp.addEventListener("input", commit));
  }
  function collect() {
    const type = fieldsBox.querySelector('[data-f="type"]').value;
    const out = { type };
    if (type !== "flying" && type !== "spirit") {
      const effects = WEAKNESS_EXTRA_EFFECTS.filter((f) => fieldsBox.querySelector(`[data-effect="${f}"]`).checked);
      if (effects.length) out.effects = effects;
      const customOn = fieldsBox.querySelector('[data-effect="custom"]').checked;
      const customText = fieldsBox.querySelector('[data-f="customEffect"]').value;
      if (customOn && customText) out.customEffect = customText;
    }
    const flavor = fieldsBox.querySelector('[data-f="flavor"]').value;
    if (flavor) out.flavor = flavor;
    return out;
  }
  function commit() {
    const enabled = body.querySelector(`#wk-enable-${id}`).checked;
    const out = enabled ? collect() : undefined;
    setField(id, "weakness", out);
    det.querySelector("summary").innerHTML = `弱点(図鑑表示) <span class="sub-summary-text">${out ? WEAKNESS_TYPE_LABELS[out.type] : "未設定"}</span>`;
    onAnyFieldChanged(id);
  }
  body.querySelector(`#wk-enable-${id}`).addEventListener("change", (ev) => {
    fieldsBox.style.display = ev.target.checked ? "" : "none";
    if (ev.target.checked && !fieldsBox.hasChildNodes()) buildFields(null);
    commit();
  });
  if (w) buildFields(w);
  det.appendChild(body);
  return det;
}

function renderStatusImmuneSub(id, enemy) {
  const det = document.createElement("details");
  det.className = "sub-detail";
  const list = enemy.statusImmune || [];
  det.innerHTML = `<summary>状態異常耐性(無効化) <span class="sub-summary-text">${list.length ? list.map((t) => DEBUFF_TYPE_LABELS[t]).join("・") : "なし"}</span></summary>`;
  const body = document.createElement("div");
  body.className = "sub-body";
  body.innerHTML = `<div class="sub-field-row" style="margin-bottom:2px;"><label style="width:auto;">この妖怪には効かない状態異常(複数選択可)</label></div>` +
    DEBUFF_TYPES.map((t) => `<label class="flag-chip" style="display:flex;"><input type="checkbox" data-immune="${t}" ${list.includes(t) ? "checked" : ""}> ${DEBUFF_TYPE_LABELS[t]}</label>`).join("");
  body.querySelectorAll("[data-immune]").forEach((cb) => cb.addEventListener("change", () => {
    const chosen = DEBUFF_TYPES.filter((t) => body.querySelector(`[data-immune="${t}"]`).checked);
    setField(id, "statusImmune", chosen.length ? chosen : undefined);
    det.querySelector("summary").innerHTML = `状態異常耐性(無効化) <span class="sub-summary-text">${chosen.length ? chosen.map((t) => DEBUFF_TYPE_LABELS[t]).join("・") : "なし"}</span>`;
    onAnyFieldChanged(id);
  }));
  det.appendChild(body);
  return det;
}

function onAnyFieldChanged(id) {
  refreshEditCount();
}

// ==== レンダリング: 敵カード ====
function buildEnemyCard(id, opts) {
  opts = opts || {};
  const enemy = getEnemy(id);
  const isNew = isNewEnemy(id);
  const card = document.createElement("details");
  card.className = "enemy-card" + (isEditedEnemy(id) ? " edited" : "") + (isNew ? " is-new" : "");
  const badges = [];
  if (enemy.isBoss) badges.push('<span class="enemy-badge boss">ボス</span>');
  if (enemy.isMidBoss) badges.push('<span class="enemy-badge">中ボス</span>');
  if (enemy.isSwarm) badges.push('<span class="enemy-badge">大群</span>');
  if (enemy.isFlying) badges.push('<span class="enemy-badge">飛行</span>');
  if (enemy.isPlant) badges.push('<span class="enemy-badge">植物</span>');
  if (enemy.questOnly) badges.push('<span class="enemy-badge">依頼専用</span>');
  const stageTag = opts.showStageTag ? `<span class="enemy-badge">${STAGE_MAP[effectiveStage(id)].ja}</span>` : "";
  const otherStages = otherStagesForImage(enemy.image, id);
  const otherStagesBadge = otherStages.length > 0 ? `<span class="also-appears-badge" title="他エリアにも同じ絵の妖怪が配置されています">🔁${otherStages.length}</span>` : "";
  card.innerHTML = `
    <summary>
      <img class="enemy-thumb" src="${escapeHtml(enemy.image || "")}" onerror="this.style.display='none'" alt="">
      <div class="enemy-summary-main">
        <div class="enemy-summary-name">${escapeHtml(enemy.ja)}</div>
        <div class="enemy-summary-sub"><span>HP${enemy.hp} 攻${enemy.atk} 防${enemy.def} 速${enemy.spd}</span><span>階${enemy.minFloor}-${enemy.maxFloor}</span></div>
      </div>
      <div class="enemy-badges">${stageTag}${otherStagesBadge}${badges.join("")}</div>
      <span class="enemy-edit-dot"></span>
      <span class="enemy-chevron">▶</span>
    </summary>
    <div class="enemy-body"></div>
  `;
  const bodyEl = card.querySelector(".enemy-body");

  if (otherStages.length > 0) {
    const alsoDiv = document.createElement("div");
    alsoDiv.className = "also-appears";
    alsoDiv.textContent = "🔁 同じ絵の妖怪が他エリアにも配置されています: " + otherStages.map((s) => s.icon + s.ja).join("、");
    bodyEl.appendChild(alsoDiv);
  }

  // 名前
  const nameRow = document.createElement("div");
  nameRow.className = "field-row";
  nameRow.innerHTML = `<label>名前</label><input type="text" data-f="ja" value="${escapeHtml(enemy.ja)}"><span class="id-caption">${escapeHtml(id)}</span>`;
  bodyEl.appendChild(nameRow);
  nameRow.querySelector("input").addEventListener("input", (ev) => {
    setField(id, "ja", ev.target.value);
    card.querySelector(".enemy-summary-name").textContent = ev.target.value;
    card.classList.toggle("edited", isEditedEnemy(id));
    refreshEditCount();
  });

  // 配置エリア(ステージ)
  const stageRow = document.createElement("div");
  stageRow.className = "field-row";
  stageRow.innerHTML = `<label>配置エリア</label><select data-f="stage" style="flex:1;">${STAGES.map((s) => `<option value="${s.id}"${effectiveStage(id) === s.id ? " selected" : ""}>${s.icon} ${s.ja}</option>`).join("")}</select>`;
  bodyEl.appendChild(stageRow);
  stageRow.querySelector("select").addEventListener("change", (ev) => {
    setField(id, "stage", ev.target.value === "forest" ? undefined : ev.target.value);
    refreshEditCount();
    render();
  });

  // フラグ
  const flagRow = document.createElement("div");
  flagRow.className = "flag-row";
  flagRow.innerHTML = FLAG_FIELDS.map((f) => `<label class="flag-chip"><input type="checkbox" data-f="${f.key}" ${enemy[f.key] ? "checked" : ""}> ${f.label}</label>`).join("");
  bodyEl.appendChild(flagRow);
  FLAG_FIELDS.forEach((f) => {
    flagRow.querySelector(`[data-f="${f.key}"]`).addEventListener("change", (ev) => {
      setField(id, f.key, ev.target.checked ? true : undefined);
      card.classList.toggle("edited", isEditedEnemy(id));
      refreshEditCount();
    });
  });

  // ステータス
  const statGrid = document.createElement("div");
  statGrid.className = "stat-grid";
  statGrid.innerHTML = STAT_FIELDS.map((f) => `<div class="stat-field"><label>${f.label}</label><input type="number" data-f="${f.key}" value="${enemy[f.key]}"></div>`).join("");
  bodyEl.appendChild(statGrid);
  STAT_FIELDS.forEach((f) => {
    statGrid.querySelector(`[data-f="${f.key}"]`).addEventListener("input", (ev) => {
      const v = ev.target.value === "" ? 0 : Number(ev.target.value);
      setField(id, f.key, v);
      card.classList.toggle("edited", isEditedEnemy(id));
      card.querySelector(".enemy-summary-sub").innerHTML = `<span>HP${getEnemy(id).hp} 攻${getEnemy(id).atk} 防${getEnemy(id).def} 速${getEnemy(id).spd}</span><span>階${getEnemy(id).minFloor}-${getEnemy(id).maxFloor}</span>`;
      refreshEditCount();
    });
  });

  bodyEl.appendChild(renderBigAttackSub(id, enemy));
  bodyEl.appendChild(renderOnHitSub(id, enemy));
  bodyEl.appendChild(renderWeaknessSub(id, enemy));
  bodyEl.appendChild(renderStatusImmuneSub(id, enemy));

  const actions = document.createElement("div");
  actions.className = "card-actions";
  actions.innerHTML = `
    <button type="button" class="small ghost dup-btn">複製</button>
    ${isEditedEnemy(id) ? '<button type="button" class="small ghost reset-btn">↺ 元に戻す</button>' : ""}
    <button type="button" class="small danger del-btn">削除</button>
  `;
  actions.querySelector(".dup-btn").addEventListener("click", (ev) => { ev.preventDefault(); openAddModal(currentStage, id); });
  actions.querySelector(".del-btn").addEventListener("click", (ev) => { ev.preventDefault(); deleteEnemy(id); });
  const resetBtn = actions.querySelector(".reset-btn");
  if (resetBtn) resetBtn.addEventListener("click", (ev) => { ev.preventDefault(); resetEnemy(id); });
  bodyEl.appendChild(actions);

  return card;
}

// ==== レンダリング: ステージタブ全体 ====
const EMPTY_HINT_STAGES = ["ruins", "gate", "castle", "valley", "bamboo", "shugendo", "yama"];
function renderStageView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const stage = STAGE_MAP[currentStage];
  const list = enemiesForStage(currentStage);
  if (list.length === 0 && EMPTY_HINT_STAGES.includes(currentStage)) {
    const banner = document.createElement("div");
    banner.className = "empty-banner";
    banner.innerHTML = `<b>${stage.ja}にはまだ妖怪が配置されていません。</b><br>ここに妖怪を追加するだけでは戦闘は発生しません。下の「道の出現確率」で戦闘率を0%より上げる必要もあります(道側が0%だと、敵がいても絶対に遭遇しません)。`;
    main.appendChild(banner);
  }
  main.appendChild(renderPathSection(currentStage));

  const section = document.createElement("section");
  section.className = "block";
  const title = document.createElement("div");
  title.className = "block-title";
  title.innerHTML = `敵一覧 <span class="block-hint">(${list.length}体・最小階層順)</span>`;
  section.appendChild(title);
  const enemyList = document.createElement("div");
  enemyList.className = "enemy-list";
  list.forEach(({ id }) => enemyList.appendChild(buildEnemyCard(id)));
  section.appendChild(enemyList);
  const addBtn = document.createElement("button");
  addBtn.type = "button";
  addBtn.className = "add-enemy-btn";
  addBtn.textContent = "+ このエリアに新しい妖怪を配置(空欄から)";
  addBtn.addEventListener("click", () => openAddModal(currentStage, null));
  section.appendChild(addBtn);
  const pickBtn = document.createElement("button");
  pickBtn.type = "button";
  pickBtn.className = "add-enemy-btn ghost";
  pickBtn.textContent = "📋 既存の妖怪(全" + allEnemyIds().length + "体)から複製して配置";
  pickBtn.addEventListener("click", () => openPickModal(currentStage));
  section.appendChild(pickBtn);
  main.appendChild(section);
}

function renderSearchView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const q = searchQuery.trim().toLowerCase();
  const list = document.createElement("div");
  list.className = "search-list";
  let found = 0;
  allEnemyIds().forEach((id) => {
    const e = getEnemy(id);
    if (!e.ja.toLowerCase().includes(q) && !id.toLowerCase().includes(q)) return;
    found++;
    list.appendChild(buildEnemyCard(id, { showStageTag: true }));
  });
  if (found === 0) main.innerHTML = '<div class="empty-hint">一致する妖怪が見つかりません</div>';
  else main.appendChild(list);
}

function renderStageTabs() {
  const nav = document.getElementById("stageTabs");
  nav.innerHTML = "";
  STAGES.forEach((s) => {
    const count = enemiesForStage(s.id).length;
    const hasEdits = enemiesForStage(s.id).some((x) => isEditedEnemy(x.id)) || stageHasPathEdits(s.id);
    const tab = document.createElement("div");
    tab.className = "stage-tab" + (s.id === currentStage ? " active" : "") + (hasEdits ? " has-edits" : "") + (count === 0 ? " empty-stage" : "");
    tab.innerHTML = `<span>${s.icon} ${s.ja}</span><span class="count-badge">${count}</span><span class="tab-edit-dot"></span>`;
    tab.addEventListener("click", () => { currentStage = s.id; searchQuery = ""; document.getElementById("searchBox").value = ""; render(); });
    nav.appendChild(tab);
  });
}

function refreshEditCount() {
  document.getElementById("editCount").textContent = "編集: " + countEdits() + "件";
  renderStageTabs();
}

function render() {
  renderStageTabs();
  refreshEditCount();
  if (searchQuery.trim()) renderSearchView();
  else renderStageView();
}

document.getElementById("searchBox").addEventListener("input", (ev) => { searchQuery = ev.target.value; render(); });
document.getElementById("resetAllBtn").addEventListener("click", resetAll);

// ==== エクスポート ====
function buildExportText() {
  const enemiesOut = {};
  Object.keys(ENEMY_DATA).forEach((id) => { if (!isRemoved(id)) enemiesOut[id] = getEnemy(id); });
  Object.keys(edits.newEnemies).forEach((id) => { enemiesOut[id] = getEnemy(id); });
  const weaknessOut = {};
  const enemiesFinal = {};
  Object.keys(enemiesOut).forEach((id) => {
    const e = Object.assign({}, enemiesOut[id]);
    if (e.weakness) { weaknessOut[id] = e.weakness; delete e.weakness; }
    enemiesFinal[id] = e;
  });

  let out = "";
  out += `// ENEMIES (data.js の同名constを置き換え) — 全${Object.keys(enemiesFinal).length}体\n`;
  out += `const ENEMIES = ${JSON.stringify(enemiesFinal, null, 2)};\n\n`;
  out += `// ENEMY_WEAKNESS (data.js の同名constを置き換え)\n`;
  out += `const ENEMY_WEAKNESS = ${JSON.stringify(weaknessOut, null, 2)};\n\n`;
  out += `// 道の出現確率(dungeon.js)。ステージごとに対応する変数名に反映してください\n`;
  STAGES.forEach((s) => {
    const pathOut = {};
    Object.keys(PATH_DATA[s.id]).forEach((pk) => {
      const row = {};
      ["icon", "label", "battle", "gold", "ambushChance", "goldMult"].forEach((f) => {
        const v = getPathValue(s.id, pk, f);
        if (v !== undefined) row[f] = v;
      });
      pathOut[pk] = row;
    });
    out += `// ${s.ja}\nconst ${s.varName} = ${JSON.stringify(pathOut, null, 2)};\n\n`;
  });
  return out;
}
function buildExportSummary() {
  const added = Object.keys(edits.newEnemies).length;
  const editedEnemies = Object.keys(edits.fields).length;
  const removed = Object.keys(edits.removed).length;
  const pathStages = Object.keys(edits.pathFields).filter((s) => Object.keys(edits.pathFields[s]).length > 0);
  const lines = [];
  lines.push(`<div>新規追加: <b>${added}体</b></div>`);
  lines.push(`<div>ステータス/技等を編集: <b>${editedEnemies}体</b></div>`);
  lines.push(`<div>削除: <b>${removed}体</b></div>`);
  lines.push(`<div>道の確率を編集したエリア: <b>${pathStages.length > 0 ? pathStages.map((s) => STAGE_MAP[s].ja).join("、") : "なし"}</b></div>`);
  return lines.join("");
}
document.getElementById("exportBtn").addEventListener("click", () => {
  document.getElementById("exportSummary").innerHTML = buildExportSummary();
  document.getElementById("exportJson").value = buildExportText();
  document.getElementById("exportModal").classList.add("open");
});
document.getElementById("closeExportBtn").addEventListener("click", () => document.getElementById("exportModal").classList.remove("open"));
document.getElementById("copyJsonBtn").addEventListener("click", () => {
  const ta = document.getElementById("exportJson");
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById("copyJsonBtn");
    const orig = btn.textContent;
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => { document.execCommand("copy"); });
});

render();
</script>

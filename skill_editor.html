<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温泉村物語 スキル一覧エディタ</title>
<style>
  :root {
    --bg: #14181b; --surface: #1c2226; --card-bg: #2f3540; --card-border: #5d4d35;
    --gold: #d7b66f; --title: #f3e7c6; --body: #ece8dc; --caption: #b6b0a2;
    --success: #6ea95b; --danger: #c95d54; --info: #7b93b9;
    --left-accent: #5fb3c9; --right-accent: #d98c5f;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--body); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; line-height: 1.5; }
  header { position: sticky; top: 0; z-index: 20; background: linear-gradient(180deg, #1c2226 0%, #171b1e 100%); border-bottom: 1px solid var(--card-border); padding: 10px 16px; }
  .header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 1.05rem; color: var(--title); margin: 0; white-space: nowrap; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-left: auto; }
  input[type="search"] { background: var(--surface); border: 1px solid var(--card-border); color: var(--body); border-radius: 8px; padding: 7px 10px; font-size: 0.85rem; width: 180px; }
  button { background: #7b5d36; color: var(--title); border: 1px solid var(--card-border); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; cursor: pointer; transition: filter 0.1s; -webkit-tap-highlight-color: transparent; }
  button:hover { filter: brightness(1.15); }
  button.danger { background: #5a2e28; }
  button.ghost { background: transparent; }
  #editCount { color: var(--gold); font-weight: bold; font-size: 0.82rem; white-space: nowrap; }
  nav#classTabs { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 0; }
  .class-tab { flex-shrink: 0; display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--card-border); border-bottom: none; border-radius: 10px 10px 0 0; padding: 7px 14px; cursor: pointer; color: var(--caption); font-size: 0.85rem; }
  .class-tab img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
  .class-tab.active { background: var(--card-bg); color: var(--title); border-color: var(--gold); }
  .class-tab .tab-edit-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); display: none; }
  .class-tab.has-edits .tab-edit-dot { display: inline-block; }
  main { max-width: 720px; margin: 0 auto; padding: 12px 10px 40px; }

  /* --- ツリー表示 --- */
  .tree-legend { display: flex; justify-content: center; gap: 16px; font-size: 0.7rem; color: var(--caption); margin: 2px 0 10px; }
  .tree-legend span { display: flex; align-items: center; gap: 5px; }
  .tree-legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .base-ability { background: var(--surface); border: 1px dashed var(--card-border); border-radius: var(--radius); padding: 10px 14px; margin: 0 auto; font-size: 0.8rem; color: var(--caption); max-width: 460px; text-align: center; }
  .base-ability b { color: var(--gold); display: block; font-size: 0.85rem; margin-bottom: 2px; }
  .tree-trunk-line { width: 2px; height: 16px; margin: 0 auto; background: repeating-linear-gradient(to bottom, var(--card-border) 0 4px, transparent 4px 8px); }
  .tree-track { position: relative; }
  .tree-track::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
    background: repeating-linear-gradient(to bottom, var(--card-border) 0 5px, transparent 5px 10px);
    transform: translateX(-1px); z-index: 0; pointer-events: none;
  }
  .swap-hint { position: sticky; top: 0; z-index: 15; background: #1c3a5e; border: 1px solid #5b9bf0; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 0.82rem; color: #cfe4ff; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .swap-hint button { flex-shrink: 0; }

  .tree-level { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .tree-node { flex: 1 1 0; min-width: 0; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
  .tree-node[open] { flex-basis: 100%; }
  .tree-node.side-left { border-left: 3px solid var(--left-accent); }
  .tree-node.side-right { border-right: 3px solid var(--right-accent); }
  .tree-node.edited { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .tree-node.swap-selected { border-color: #5b9bf0; box-shadow: 0 0 0 2px #5b9bf0 inset; }

  .tree-node summary { list-style: none; cursor: pointer; padding: 8px 8px; display: flex; align-items: center; gap: 5px; -webkit-tap-highlight-color: transparent; }
  .tree-node summary::-webkit-details-marker { display: none; }
  .node-tag { font-size: 0.66rem; font-weight: bold; border-radius: 5px; padding: 2px 5px; flex-shrink: 0; white-space: nowrap; }
  .side-left .node-tag { color: var(--left-accent); background: rgba(95, 179, 201, 0.15); }
  .side-right .node-tag { color: var(--right-accent); background: rgba(217, 140, 95, 0.15); }
  .node-name { flex: 1; min-width: 0; font-size: 0.84rem; font-weight: bold; color: var(--title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-mp { font-size: 0.66rem; color: var(--info); flex-shrink: 0; }
  .node-edit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; display: none; }
  .tree-node.edited .node-edit-dot { display: inline-block; }
  .node-swap-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--info); color: var(--info); border-radius: 5px; font-size: 0.7rem; line-height: 1; padding: 3px 4px; }
  .node-swap-btn.active { background: #5b9bf0; color: #0f1214; border-color: #5b9bf0; }
  .node-chevron { flex-shrink: 0; color: var(--caption); font-size: 0.65rem; transition: transform 0.15s; }
  .tree-node[open] .node-chevron { transform: rotate(90deg); }

  .tree-node-body { padding: 8px 10px 10px; border-top: 1px solid rgba(255,255,255,0.06); }
  .skill-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .skill-name-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--title); font-size: 0.95rem; font-weight: bold; padding: 2px 4px; min-width: 0; }
  .skill-name-input:focus { outline: none; border-bottom-color: var(--gold); background: rgba(255,255,255,0.04); }
  .rand-name-btn { flex-shrink: 0; background: transparent; border: 1px solid var(--card-border); border-radius: 6px; padding: 2px 6px; font-size: 0.82rem; cursor: pointer; color: var(--gold); }
  .rand-name-btn:hover { background: rgba(255,255,255,0.08); }
  .mp-badge { font-size: 0.7rem; color: var(--info); flex-shrink: 0; display: flex; align-items: center; gap: 2px; }
  .mp-input { width: 34px; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--info); font-size: 0.7rem; text-align: right; padding: 1px; }
  .mp-input:focus { outline: none; border-bottom-color: var(--info); }
  .skill-desc-input { width: 100%; background: rgba(0,0,0,0.15); border: 1px solid transparent; border-radius: 6px; color: var(--body); font-size: 0.82rem; padding: 6px 8px; resize: vertical; min-height: 44px; font-family: inherit; }
  .skill-desc-input:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.25); }
  .skill-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .edited-badge { font-size: 0.68rem; color: var(--gold); display: none; }
  .tree-node.edited .edited-badge { display: inline; }
  .reset-btn { font-size: 0.68rem; padding: 3px 8px; background: transparent; border-color: var(--card-border); color: var(--caption); display: none; }
  .tree-node.edited .reset-btn { display: inline-block; }
  details.mech-detail { margin-top: 6px; }
  details.mech-detail summary { font-size: 0.68rem; color: var(--caption); cursor: pointer; padding: 0; display: block; }
  details.mech-detail summary::-webkit-details-marker { display: inline; }
  details.mech-detail pre { font-size: 0.68rem; color: var(--caption); background: rgba(0,0,0,0.25); border-radius: 6px; padding: 6px 8px; margin: 4px 0 0; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }

  .search-list { display: flex; flex-direction: column; gap: 8px; }
  .empty-hint { color: var(--caption); font-size: 0.85rem; text-align: center; padding: 40px 10px; }

  #exportModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  #exportModal.open { display: flex; }
  .export-panel { background: var(--surface); border: 1px solid var(--gold); border-radius: var(--radius); padding: 16px; max-width: 640px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; gap: 10px; }
  .export-panel h2 { margin: 0; font-size: 1rem; color: var(--title); }
  .export-panel textarea { width: 100%; flex: 1; min-height: 200px; background: #0f1214; color: var(--body); border: 1px solid var(--card-border); border-radius: 8px; font-family: monospace; font-size: 0.75rem; padding: 8px; }
  .export-diff-list { max-height: 200px; overflow-y: auto; font-size: 0.78rem; background: #0f1214; border-radius: 8px; padding: 8px 10px; border: 1px solid var(--card-border); }
  .export-diff-list .diff-item { margin-bottom: 8px; }
  .export-diff-list .diff-item .diff-title { color: var(--gold); font-weight: bold; }
  .export-diff-list .diff-field { color: var(--caption); }
  .export-diff-list del { color: var(--danger); text-decoration: line-through; opacity: 0.7; }
  .export-diff-list ins { color: var(--success); text-decoration: none; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>♨️ 温泉村物語 スキル一覧エディタ</h1>
    <div class="toolbar">
      <input type="search" id="searchBox" placeholder="スキル名・効果文で検索...">
      <span id="editCount">編集: 0件</span>
      <button id="exportBtn">📋 エクスポート</button>
      <button id="resetAllBtn" class="danger ghost">全て元に戻す</button>
    </div>
  </div>
  <nav id="classTabs"></nav>
</header>
<main id="mainArea"></main>

<div id="exportModal">
  <div class="export-panel">
    <h2>編集内容のエクスポート</h2>
    <div id="exportDiffList" class="export-diff-list"></div>
    <textarea id="exportJson" readonly></textarea>
    <div class="modal-actions">
      <button id="copyJsonBtn">JSONをコピー</button>
      <button id="closeExportBtn" class="ghost">閉じる</button>
    </div>
  </div>
</div>

function pickRandomSkillName(cid) {
  const pool = RANDOM_NAME_POOLS[cid] || [];
  if (pool.length === 0) return "";
  // 同じ職業内で現在使われている名前(編集済み含む)とは被らない候補を優先する
  const used = new Set();
  const cls = SKILL_DATA[cid];
  Object.keys(cls.levels).forEach((lvl) => {
    ["left", "right"].forEach((side) => {
      const skill = cls.levels[lvl][side];
      used.add(currentValue(cid, lvl, side, "name", skill.name));
    });
  });
  const candidates = pool.filter((n) => !used.has(n));
  const list = candidates.length > 0 ? candidates : pool;
  return list[Math.floor(Math.random() * list.length)];
}

const STORAGE_KEY = "onsenSkillEditor_v1";
let edits = {};
try { edits = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { edits = {}; }

function saveEdits() { localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); }
function getEdit(cid, lvl, side, field) {
  return edits[cid] && edits[cid][lvl] && edits[cid][lvl][side] && edits[cid][lvl][side][field];
}
function setEdit(cid, lvl, side, field, value, original) {
  if (value === original) {
    // 元の値に戻したら編集エントリ自体を消す(エクスポートを綺麗に保つ)
    if (edits[cid] && edits[cid][lvl] && edits[cid][lvl][side]) {
      delete edits[cid][lvl][side][field];
      if (Object.keys(edits[cid][lvl][side]).length === 0) delete edits[cid][lvl][side];
      if (Object.keys(edits[cid][lvl]).length === 0) delete edits[cid][lvl];
      if (Object.keys(edits[cid]).length === 0) delete edits[cid];
    }
  } else {
    edits[cid] = edits[cid] || {};
    edits[cid][lvl] = edits[cid][lvl] || {};
    edits[cid][lvl][side] = edits[cid][lvl][side] || {};
    edits[cid][lvl][side][field] = value;
  }
  saveEdits();
}
function currentValue(cid, lvl, side, field, original) {
  const e = getEdit(cid, lvl, side, field);
  return e !== undefined ? e : original;
}
function isEditedField(cid, lvl, side, field) {
  return getEdit(cid, lvl, side, field) !== undefined;
}
function isEditedSkill(cid, lvl, side) {
  return !!(edits[cid] && edits[cid][lvl] && edits[cid][lvl][side] && Object.keys(edits[cid][lvl][side]).length > 0);
}
function countEdits() {

}

// スキル同士の場所(内容)を入れ替える機能。⇄ボタンを押した2枚のカードの間で、
// 現在表示中の内容(name/desc/mp。仕組み/mechは各スロット固定の実装データのため対象外、
// 上部details参照)をまるごと入れ替える。入れ替え先は必ずそれぞれの元データと比較して
// 差分判定するため、入れ替え後も通常の編集(✎編集済み/元に戻す)と同じ仕組みで扱える
let swapSource = null; // {cid, lvl, side} | null
function performSwap(a, b) {
  const skillA = SKILL_DATA[a.cid].levels[a.lvl][a.side];
  const skillB = SKILL_DATA[b.cid].levels[b.lvl][b.side];
  const valA = { name: currentValue(a.cid, a.lvl, a.side, "name", skillA.name), desc: currentValue(a.cid, a.lvl, a.side, "desc", skillA.desc), mp: currentValue(a.cid, a.lvl, a.side, "mp", skillA.mp) };
  const valB = { name: currentValue(b.cid, b.lvl, b.side, "name", skillB.name), desc: currentValue(b.cid, b.lvl, b.side, "desc", skillB.desc), mp: currentValue(b.cid, b.lvl, b.side, "mp", skillB.mp) };
  ["name", "desc", "mp"].forEach((f) => {
    setEdit(a.cid, a.lvl, a.side, f, valB[f], skillA[f]);
    setEdit(b.cid, b.lvl, b.side, f, valA[f], skillB[f]);
  });
  swapSource = null;
  render();
}
function handleSwapClick(cid, lvl, side) {
  const here = { cid, lvl, side };
  if (!swapSource) {
    swapSource = here;
    render();
    return;
  }
  if (swapSource.cid === cid && swapSource.lvl === lvl && swapSource.side === side) {
    swapSource = null; // 同じカードをもう一度押したら選択解除
    render();
    return;
  }
  performSwap(swapSource, here);
}

  const name = currentValue(cid, lvl, side, "name", skill.name);
  const desc = currentValue(cid, lvl, side, "desc", skill.desc);
  const mp = currentValue(cid, lvl, side, "mp", skill.mp);
  const edited = isEditedSkill(cid, lvl, side);
  const isSwapSelected = !!(swapSource && swapSource.cid === cid && swapSource.lvl === lvl && swapSource.side === side);
  const { name: _n, desc: _d, ...mech } = skill;
  const node = document.createElement("details");
  node.className = "tree-node side-" + side + (edited ? " edited" : "") + (isSwapSelected ? " swap-selected" : "");
  const sideJa = side === "left" ? "左" : "右";
  const tagText = opts.classLabel ? `${opts.classLabel}・Lv.${lvl}・${sideJa}` : `Lv.${lvl}`;
  node.innerHTML = `
    <summary>
      <span class="node-tag">${escapeHtml(tagText)}</span>
      <span class="node-name">${escapeHtml(name)}</span>
      <span class="node-mp">MP${mp}</span>
      <span class="node-edit-dot"></span>
      ${allowSwap ? `<button type="button" class="node-swap-btn${isSwapSelected ? " active" : ""}" title="このスキルを入れ替え元/入れ替え先に選ぶ">⇄</button>` : ""}
      <span class="node-chevron">▶</span>
    </summary>
    <div class="tree-node-body">
      <div class="skill-card-head">
        <input class="skill-name-input" data-field="name" value="${escapeHtml(name)}">
        ${RANDOM_NAME_POOLS[cid] ? `<button class="rand-name-btn" type="button" title="ランダムなかっこいい名前を提案(名前欄を空にしてから押すと分かりやすい)">🎲</button>` : ""}
        <span class="mp-badge">MP<input class="mp-input" type="number" min="0" data-field="mp" value="${mp}"></span>
      </div>
      <textarea class="skill-desc-input" data-field="desc">${escapeHtml(desc)}</textarea>
      <div class="skill-meta">
        <span class="edited-badge">✎ 編集済み(元: 「${escapeHtml(skill.name)}」)</span>
        <button class="reset-btn">↺ 元に戻す</button>
      </div>
      <details class="mech-detail"><summary>仕組み(実装データ・参考/読み取り専用)</summary><pre>${escapeHtml(JSON.stringify(mech, null, 2))}</pre></details>
    </div>
  `;
  const nameInput = node.querySelector('[data-field="name"]');
  const nodeNameLabel = node.querySelector(".node-name");
  const nodeMpLabel = node.querySelector(".node-mp");
  nameInput.addEventListener("input", (e) => {
    setEdit(cid, lvl, side, "name", e.target.value, skill.name);
    node.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    nodeNameLabel.textContent = e.target.value || "(無題)";
    refreshEditCount();
  });
  const randBtn = node.querySelector(".rand-name-btn");
  if (randBtn) {
    randBtn.addEventListener("click", () => {
      const picked = pickRandomSkillName(cid);
      if (!picked) return;
      nameInput.value = picked;
      setEdit(cid, lvl, side, "name", picked, skill.name);
      node.classList.toggle("edited", isEditedSkill(cid, lvl, side));
      nodeNameLabel.textContent = picked;
      refreshEditCount();
    });
  }
  node.querySelector('[data-field="mp"]').addEventListener("input", (e) => {
    const v = e.target.value === "" ? skill.mp : Number(e.target.value);
    setEdit(cid, lvl, side, "mp", v, skill.mp);
    node.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    nodeMpLabel.textContent = "MP" + v;
    refreshEditCount();
  });
  node.querySelector('[data-field="desc"]').addEventListener("input", (e) => {
    setEdit(cid, lvl, side, "desc", e.target.value, skill.desc);
    node.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    refreshEditCount();
  });
  node.querySelector(".reset-btn").addEventListener("click", () => resetSkill(cid, lvl, side));
  if (allowSwap) {
    node.querySelector(".node-swap-btn").addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      handleSwapClick(cid, lvl, side);
    });
  }
  return node;
}

function renderClassTabs() {
  const nav = document.getElementById("classTabs");
  nav.innerHTML = "";
  classIds.forEach((cid) => {
    const cls = SKILL_DATA[cid];
    const hasEdits = !!edits[cid];
    const tab = document.createElement("div");
    tab.className = "class-tab" + (cid === currentClass ? " active" : "") + (hasEdits ? " has-edits" : "");
    tab.innerHTML = `<img src="${cls.image}" alt=""><span>${cls.ja}</span><span class="tab-edit-dot"></span>`;
    tab.addEventListener("click", () => { currentClass = cid; searchQuery = ""; document.getElementById("searchBox").value = ""; render(); });
    nav.appendChild(tab);
  });
}

function renderClassView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const cls = SKILL_DATA[currentClass];
  if (swapSource && swapSource.cid === currentClass) {
    const hint = document.createElement("div");
    hint.className = "swap-hint";
    hint.innerHTML = `<span>⇄ 入れ替え先のスキルの⇄ボタンを押してください(同じ職業内のみ)</span><button class="ghost">キャンセル</button>`;
    hint.querySelector("button").addEventListener("click", () => { swapSource = null; render(); });
    main.appendChild(hint);
  }
  const legend = document.createElement("div");
  legend.className = "tree-legend";
  legend.innerHTML = `<span><span class="dot" style="background:var(--left-accent);"></span>左の道</span><span><span class="dot" style="background:var(--right-accent);"></span>右の道</span>`;
  main.appendChild(legend);
  const baseDiv = document.createElement("div");
  baseDiv.className = "base-ability";
  baseDiv.innerHTML = `<b>初期習得(Lv.1)</b>${escapeHtml(cls.base.name)} — ${escapeHtml(cls.base.desc)}<br><span style="opacity:0.7;">※他の職業と共有する基本技のため、このツールでは編集対象外です</span>`;
  main.appendChild(baseDiv);
  const trunk = document.createElement("div");
  trunk.className = "tree-trunk-line";
  main.appendChild(trunk);
  const track = document.createElement("div");
  track.className = "tree-track";
  const levels = Object.keys(cls.levels).map(Number).sort((a, b) => a - b);
  levels.forEach((lvl) => {
    const row = document.createElement("div");
    row.className = "tree-level";
    row.appendChild(buildSkillCard(currentClass, lvl, "left", cls.levels[lvl].left, true));
    row.appendChild(buildSkillCard(currentClass, lvl, "right", cls.levels[lvl].right, true));
    track.appendChild(row);
  });
  main.appendChild(track);
}

function renderSearchView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const q = searchQuery.trim().toLowerCase();
  const list = document.createElement("div");
  list.className = "search-list";
  let found = 0;
  classIds.forEach((cid) => {
    const cls = SKILL_DATA[cid];
    const levels = Object.keys(cls.levels).map(Number).sort((a, b) => a - b);
    levels.forEach((lvl) => {
      ["left", "right"].forEach((side) => {
        const skill = cls.levels[lvl][side];
        const name = currentValue(cid, lvl, side, "name", skill.name);
        const desc = currentValue(cid, lvl, side, "desc", skill.desc);
        if (!name.toLowerCase().includes(q) && !desc.toLowerCase().includes(q)) return;
        found++;
        list.appendChild(buildSkillCard(cid, lvl, side, skill, false, { classLabel: cls.ja }));
      });
    });
  });
  if (found === 0) {
    main.innerHTML = '<div class="empty-hint">一致するスキルが見つかりません</div>';
  } else {
    main.appendChild(list);
  }
}

function refreshEditCount() {
  document.getElementById("editCount").textContent = "編集: " + countEdits() + "件";
  renderClassTabs();
}

function render() {
  renderClassTabs();
  refreshEditCount();
  if (searchQuery.trim()) renderSearchView();
  else renderClassView();
}

document.getElementById("searchBox").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  render();
});
document.getElementById("resetAllBtn").addEventListener("click", resetAll);

function buildExportData() {
  const diffs = [];
  Object.keys(edits).forEach((cid) => {
    Object.keys(edits[cid]).forEach((lvl) => {
      Object.keys(edits[cid][lvl]).forEach((side) => {
        const fields = edits[cid][lvl][side];
        const original = SKILL_DATA[cid].levels[lvl][side];
        diffs.push({ cid, cja: SKILL_DATA[cid].ja, lvl, side, fields, original });
      });
    });
  });
  return diffs;
}
document.getElementById("exportBtn").addEventListener("click", () => {
  const diffs = buildExportData();
  const listEl = document.getElementById("exportDiffList");
  if (diffs.length === 0) {
    listEl.innerHTML = '<div class="empty-hint">まだ編集がありません</div>';
  } else {
    listEl.innerHTML = diffs.map((d) => {
      const fieldLines = Object.keys(d.fields).map((f) => {
        const label = f === "name" ? "名前" : f === "desc" ? "効果" : "MP";
        return `<div class="diff-field">${label}: <del>${escapeHtml(String(d.original[f]))}</del> → <ins>${escapeHtml(String(d.fields[f]))}</ins></div>`;
      }).join("");
      return `<div class="diff-item"><div class="diff-title">[${d.cja}] Lv.${d.lvl} ${d.side === "left" ? "左" : "右"}: ${escapeHtml(d.original.name)}</div>${fieldLines}</div>`;
    }).join("");
  }
  document.getElementById("exportJson").value = JSON.stringify(edits, null, 2);
  document.getElementById("exportModal").classList.add("open");
});
document.getElementById("closeExportBtn").addEventListener("click", () => {
  document.getElementById("exportModal").classList.remove("open");
});
document.getElementById("copyJsonBtn").addEventListener("click", () => {
  const ta = document.getElementById("exportJson");
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById("copyJsonBtn");
    const orig = btn.textContent;
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => { document.execCommand("copy"); });
});

render();
</script>
</body>
</html>

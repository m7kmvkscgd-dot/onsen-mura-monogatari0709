<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>温泉村物語 スキル一覧エディタ</title>
<style>
  :root {
    --bg: #14181b; --surface: #1c2226; --card-bg: #2f3540; --card-border: #5d4d35;
    --gold: #d7b66f; --title: #f3e7c6; --body: #ece8dc; --caption: #b6b0a2;
    --success: #6ea95b; --danger: #c95d54; --info: #7b93b9;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--body); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; line-height: 1.5; }
  header { position: sticky; top: 0; z-index: 20; background: linear-gradient(180deg, #1c2226 0%, #171b1e 100%); border-bottom: 1px solid var(--card-border); padding: 10px 16px; }
  .header-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 1.05rem; color: var(--title); margin: 0; white-space: nowrap; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-left: auto; }
  input[type="search"] { background: var(--surface); border: 1px solid var(--card-border); color: var(--body); border-radius: 8px; padding: 7px 10px; font-size: 0.85rem; width: 180px; }
  button { background: #7b5d36; color: var(--title); border: 1px solid var(--card-border); border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; cursor: pointer; transition: filter 0.1s; }
  button:hover { filter: brightness(1.15); }
  button.danger { background: #5a2e28; }
  button.ghost { background: transparent; }
  #editCount { color: var(--gold); font-weight: bold; font-size: 0.82rem; white-space: nowrap; }
  nav#classTabs { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 0; }
  .class-tab { flex-shrink: 0; display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--card-border); border-bottom: none; border-radius: 10px 10px 0 0; padding: 7px 14px; cursor: pointer; color: var(--caption); font-size: 0.85rem; }
  .class-tab img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
  .class-tab.active { background: var(--card-bg); color: var(--title); border-color: var(--gold); }
  .class-tab .tab-edit-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); display: none; }
  .class-tab.has-edits .tab-edit-dot { display: inline-block; }
  main { max-width: 980px; margin: 0 auto; padding: 16px; }
  .base-ability { background: var(--surface); border: 1px dashed var(--card-border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; font-size: 0.82rem; color: var(--caption); }
  .base-ability b { color: var(--gold); }
  .level-group { margin-bottom: 18px; }
  .level-label { font-size: 0.78rem; color: var(--caption); letter-spacing: 0.05em; margin: 0 0 6px 2px; text-transform: uppercase; }
  .level-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 640px) { .level-pair { grid-template-columns: 1fr; } }
  .skill-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 10px 12px; position: relative; transition: border-color 0.15s; }
  .skill-card.edited { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .skill-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .side-tag { font-size: 0.68rem; color: var(--caption); background: rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 5px; flex-shrink: 0; }
  .skill-name-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--title); font-size: 0.95rem; font-weight: bold; padding: 2px 4px; min-width: 0; }
  .skill-name-input:focus { outline: none; border-bottom-color: var(--gold); background: rgba(255,255,255,0.04); }
  .mp-badge { font-size: 0.7rem; color: var(--info); flex-shrink: 0; display: flex; align-items: center; gap: 2px; }
  .mp-input { width: 34px; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--info); font-size: 0.7rem; text-align: right; padding: 1px; }
  .mp-input:focus { outline: none; border-bottom-color: var(--info); }
  .skill-desc-input { width: 100%; background: rgba(0,0,0,0.15); border: 1px solid transparent; border-radius: 6px; color: var(--body); font-size: 0.82rem; padding: 6px 8px; resize: vertical; min-height: 44px; font-family: inherit; }
  .skill-desc-input:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.25); }
  .skill-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .edited-badge { font-size: 0.68rem; color: var(--gold); display: none; }
  .skill-card.edited .edited-badge { display: inline; }
  .reset-btn { font-size: 0.68rem; padding: 3px 8px; background: transparent; border-color: var(--card-border); color: var(--caption); display: none; }
  .skill-card.edited .reset-btn { display: inline-block; }
  details.mech-detail { margin-top: 6px; }
  details.mech-detail summary { font-size: 0.68rem; color: var(--caption); cursor: pointer; }
  details.mech-detail pre { font-size: 0.68rem; color: var(--caption); background: rgba(0,0,0,0.25); border-radius: 6px; padding: 6px 8px; margin: 4px 0 0; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .search-result-class { font-size: 0.65rem; color: var(--gold); margin-bottom: 4px; }
  .empty-hint { color: var(--caption); font-size: 0.85rem; text-align: center; padding: 40px 10px; }
  #exportModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  #exportModal.open { display: flex; }
  .export-panel { background: var(--surface); border: 1px solid var(--gold); border-radius: var(--radius); padding: 16px; max-width: 640px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; gap: 10px; }
  .export-panel h2 { margin: 0; font-size: 1rem; color: var(--title); }
  .export-panel textarea { width: 100%; flex: 1; min-height: 200px; background: #0f1214; color: var(--body); border: 1px solid var(--card-border); border-radius: 8px; font-family: monospace; font-size: 0.75rem; padding: 8px; }
  .export-diff-list { max-height: 200px; overflow-y: auto; font-size: 0.78rem; background: #0f1214; border-radius: 8px; padding: 8px 10px; border: 1px solid var(--card-border); }
  .export-diff-list .diff-item { margin-bottom: 8px; }
  .export-diff-list .diff-item .diff-title { color: var(--gold); font-weight: bold; }
  .export-diff-list .diff-field { color: var(--caption); }
  .export-diff-list del { color: var(--danger); text-decoration: line-through; opacity: 0.7; }
  .export-diff-list ins { color: var(--success); text-decoration: none; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>♨️ 温泉村物語 スキル一覧エディタ</h1>
    <div class="toolbar">
      <input type="search" id="searchBox" placeholder="スキル名・効果文で検索...">
      <span id="editCount">編集: 0件</span>
      <button id="exportBtn">📋 エクスポート</button>
      <button id="resetAllBtn" class="danger ghost">全て元に戻す</button>
    </div>
  </div>
  <nav id="classTabs"></nav>
</header>
<main id="mainArea"></main>

<div id="exportModal">
  <div class="export-panel">
    <h2>編集内容のエクスポート</h2>
    <div id="exportDiffList" class="export-diff-list"></div>
    <textarea id="exportJson" readonly></textarea>
    <div class="modal-actions">
      <button id="copyJsonBtn">JSONをコピー</button>
      <button id="closeExportBtn" class="ghost">閉じる</button>
    </div>
  </div>
</div>

}
function isEditedField(cid, lvl, side, field) {
  return getEdit(cid, lvl, side, field) !== undefined;
}
function isEditedSkill(cid, lvl, side) {
  return !!(edits[cid] && edits[cid][lvl] && edits[cid][lvl][side] && Object.keys(edits[cid][lvl][side]).length > 0);
}
function countEdits() {
  let n = 0;
  Object.values(edits).forEach((lvls) => Object.values(lvls).forEach((sides) => Object.values(sides).forEach((fields) => { n += Object.keys(fields).length; })));
  return n;
}
function resetSkill(cid, lvl, side) {
  if (edits[cid] && edits[cid][lvl]) {
    delete edits[cid][lvl][side];
    if (Object.keys(edits[cid][lvl]).length === 0) delete edits[cid][lvl];
    if (Object.keys(edits[cid]).length === 0) delete edits[cid];
  }
  saveEdits();
  render();
}
function resetAll() {
  if (!confirm("全ての編集内容を破棄しますか？この操作は取り消せません。")) return;
  edits = {};
  saveEdits();
  render();
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function buildSkillCard(cid, lvl, side, skill) {
  const name = currentValue(cid, lvl, side, "name", skill.name);
  const desc = currentValue(cid, lvl, side, "desc", skill.desc);
  const mp = currentValue(cid, lvl, side, "mp", skill.mp);
  const edited = isEditedSkill(cid, lvl, side);
  const { name: _n, desc: _d, ...mech } = skill;
  const card = document.createElement("div");
  card.className = "skill-card" + (edited ? " edited" : "");
  card.innerHTML = `
    <div class="skill-card-head">
      <span class="side-tag">${side === "left" ? "左" : "右"}</span>
      <input class="skill-name-input" data-field="name" value="${escapeHtml(name)}">
      <span class="mp-badge">MP<input class="mp-input" type="number" min="0" data-field="mp" value="${mp}"></span>
    </div>
    <textarea class="skill-desc-input" data-field="desc">${escapeHtml(desc)}</textarea>
    <div class="skill-meta">
      <span class="edited-badge">✎ 編集済み(元: 「${escapeHtml(skill.name)}」)</span>
      <button class="reset-btn">↺ 元に戻す</button>
    </div>
    <details class="mech-detail"><summary>仕組み(実装データ・参考/読み取り専用)</summary><pre>${escapeHtml(JSON.stringify(mech, null, 2))}</pre></details>
  `;
  card.querySelector('[data-field="name"]').addEventListener("input", (e) => {
    setEdit(cid, lvl, side, "name", e.target.value, skill.name);
    card.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    refreshEditCount();
  });
  card.querySelector('[data-field="mp"]').addEventListener("input", (e) => {
    const v = e.target.value === "" ? skill.mp : Number(e.target.value);
    setEdit(cid, lvl, side, "mp", v, skill.mp);
    card.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    refreshEditCount();
  });
  card.querySelector('[data-field="desc"]').addEventListener("input", (e) => {
    setEdit(cid, lvl, side, "desc", e.target.value, skill.desc);
    card.classList.toggle("edited", isEditedSkill(cid, lvl, side));
    refreshEditCount();
  });
  card.querySelector(".reset-btn").addEventListener("click", () => resetSkill(cid, lvl, side));
  return card;
}

function renderClassTabs() {
  const nav = document.getElementById("classTabs");
  nav.innerHTML = "";
  classIds.forEach((cid) => {
    const cls = SKILL_DATA[cid];
    const hasEdits = !!edits[cid];
    const tab = document.createElement("div");
    tab.className = "class-tab" + (cid === currentClass ? " active" : "") + (hasEdits ? " has-edits" : "");
    tab.innerHTML = `<img src="${cls.image}" alt=""><span>${cls.ja}</span><span class="tab-edit-dot"></span>`;
    tab.addEventListener("click", () => { currentClass = cid; searchQuery = ""; document.getElementById("searchBox").value = ""; render(); });
    nav.appendChild(tab);
  });
}

function renderClassView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const cls = SKILL_DATA[currentClass];
  const baseDiv = document.createElement("div");
  baseDiv.className = "base-ability";
  baseDiv.innerHTML = `<b>初期習得(Lv.1)</b>: ${escapeHtml(cls.base.name)} — ${escapeHtml(cls.base.desc)}<br><span style="opacity:0.7;">※他の職業と共有する基本技のため、このツールでは編集対象外です</span>`;
  main.appendChild(baseDiv);
  const levels = Object.keys(cls.levels).map(Number).sort((a, b) => a - b);
  levels.forEach((lvl) => {
    const group = document.createElement("div");
    group.className = "level-group";
    const label = document.createElement("div");
    label.className = "level-label";
    label.textContent = "Lv." + lvl;
    group.appendChild(label);
    const pair = document.createElement("div");
    pair.className = "level-pair";
    pair.appendChild(buildSkillCard(currentClass, lvl, "left", cls.levels[lvl].left));
    pair.appendChild(buildSkillCard(currentClass, lvl, "right", cls.levels[lvl].right));
    group.appendChild(pair);
    main.appendChild(group);
  });
}

function renderSearchView() {
  const main = document.getElementById("mainArea");
  main.innerHTML = "";
  const q = searchQuery.trim().toLowerCase();
  let found = 0;
  classIds.forEach((cid) => {
    const cls = SKILL_DATA[cid];
    const levels = Object.keys(cls.levels).map(Number).sort((a, b) => a - b);
    levels.forEach((lvl) => {
      ["left", "right"].forEach((side) => {
        const skill = cls.levels[lvl][side];
        const name = currentValue(cid, lvl, side, "name", skill.name);
        const desc = currentValue(cid, lvl, side, "desc", skill.desc);
        if (!name.toLowerCase().includes(q) && !desc.toLowerCase().includes(q)) return;
        found++;
        const wrap = document.createElement("div");
        wrap.className = "level-group";
        wrap.innerHTML = `<div class="search-result-class">${cls.ja} ・ Lv.${lvl}</div>`;
        const pairWrap = document.createElement("div");
        pairWrap.className = "level-pair";
        pairWrap.style.gridTemplateColumns = "1fr";
        pairWrap.appendChild(buildSkillCard(cid, lvl, side, skill));
        wrap.appendChild(pairWrap);
        main.appendChild(wrap);
      });
    });
  });
  if (found === 0) {
    main.innerHTML += '<div class="empty-hint">一致するスキルが見つかりません</div>';
  }
}

function refreshEditCount() {
  document.getElementById("editCount").textContent = "編集: " + countEdits() + "件";
  renderClassTabs();
}

function render() {
  renderClassTabs();
  refreshEditCount();
  if (searchQuery.trim()) renderSearchView();
  else renderClassView();
}

document.getElementById("searchBox").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  render();
});
document.getElementById("resetAllBtn").addEventListener("click", resetAll);

function buildExportData() {
  const diffs = [];
  Object.keys(edits).forEach((cid) => {
    Object.keys(edits[cid]).forEach((lvl) => {
      Object.keys(edits[cid][lvl]).forEach((side) => {
        const fields = edits[cid][lvl][side];
        const original = SKILL_DATA[cid].levels[lvl][side];
        diffs.push({ cid, cja: SKILL_DATA[cid].ja, lvl, side, fields, original });
      });
    });
  });
  return diffs;
}
document.getElementById("exportBtn").addEventListener("click", () => {
  const diffs = buildExportData();
  const listEl = document.getElementById("exportDiffList");
  if (diffs.length === 0) {
    listEl.innerHTML = '<div class="empty-hint">まだ編集がありません</div>';
  } else {
    listEl.innerHTML = diffs.map((d) => {
      const fieldLines = Object.keys(d.fields).map((f) => {
        const label = f === "name" ? "名前" : f === "desc" ? "効果" : "MP";
        return `<div class="diff-field">${label}: <del>${escapeHtml(String(d.original[f]))}</del> → <ins>${escapeHtml(String(d.fields[f]))}</ins></div>`;
      }).join("");
      return `<div class="diff-item"><div class="diff-title">[${d.cja}] Lv.${d.lvl} ${d.side === "left" ? "左" : "右"}: ${escapeHtml(d.original.name)}</div>${fieldLines}</div>`;
    }).join("");
  }
  document.getElementById("exportJson").value = JSON.stringify(edits, null, 2);
  document.getElementById("exportModal").classList.add("open");
});
document.getElementById("closeExportBtn").addEventListener("click", () => {
  document.getElementById("exportModal").classList.remove("open");
});
document.getElementById("copyJsonBtn").addEventListener("click", () => {
  const ta = document.getElementById("exportJson");
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById("copyJsonBtn");
    const orig = btn.textContent;
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => { document.execCommand("copy"); });
});

render();
</script>
</body>
</html>
